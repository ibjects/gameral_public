<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Floe</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a1220;touch-action:none;user-select:none;-webkit-user-select:none;font-family:ui-monospace,Menlo,monospace}canvas{display:block}</style>
</head><body><canvas></canvas><script>
// FLOE — swipe to slide across the ice; you can't stop until you hit something.
// Grab every key, stop on the exit. Every level is generated AND machine-proven solvable,
// so the puzzles literally never run out — Mario's whole-game-on-a-floppy spirit.
const cv=document.querySelector('canvas'),g=cv.getContext('2d');let W,H;
function fit(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;g.setTransform(d,0,0,d,0,0)}
onresize=fit;fit();
const CW=7,CH=9;
let state='menu',lvl=1,best=0,grid=[],pc=0,pr=0,keys=0,keysTotal=0,got={},par=0,moves=0,anim=null,t=0,swipe=null,falls=0;
function at(c,r){return(c<0||r<0||c>=CW||r>=CH)?1:grid[r*CH*0+r*CW+c]}
// cells: 0 ice, 1 rock, 2 hole, 3 exit, 4 key
function slideFrom(c,r,d,keyset){ // returns {c,r,dead,collected[]}
 const dc=[1,0,-1,0][d],dr=[0,1,0,-1][d];const col=[];
 while(true){const nc=c+dc,nr=r+dr;
  const cell=at(nc,nr);
  if(cell===1)break;
  c=nc;r=nr;
  if(cell===2)return{c,r,dead:true,col};
  if(cell===4&&!keyset.has(c+','+r))col.push(c+','+r);
  if(cell===3)return{c,r,dead:false,col,exit:true};
 }
 return{c,r,dead:false,col}}
function solvable(sc,sr){ // BFS over (pos, keys collected)
 const keyCells=[];grid.forEach((v,i)=>{if(v===4)keyCells.push((i%CW)+','+((i/CW)|0))});
 const idx=s=>keyCells.indexOf(s);
 const seen=new Set();const q=[[sc,sr,0,0]];seen.add(sc+','+sr+',0');
 while(q.length){const[c,r,mask,d0]=q.shift();
  if(d0>26)continue;
  for(let d=0;d<4;d++){
   const ks=new Set(keyCells.filter((k,i)=>mask&(1<<i)));
   const res=slideFrom(c,r,d,ks);
   if(res.dead)continue;
   if(res.c===c&&res.r===r)continue;
   let m2=mask;for(const k of res.col)m2|=(1<<idx(k));
   if(res.exit&&m2===(1<<keyCells.length)-1)return d0+1;
   const st=res.c+','+res.r+','+m2;
   if(!seen.has(st)){seen.add(st);q.push([res.c,res.r,m2,d0+1])}}}
 return 0}
function gen(){
 const rocks=5+Math.min(9,lvl),holes=Math.min(6,1+(lvl/2|0)),nk=Math.min(3,(lvl>2?1:0)+(lvl/5|0));
 for(let tries=0;tries<300;tries++){
  grid=new Array(CW*CH).fill(0);
  const put=v=>{for(let i=0;i<80;i++){const c=Math.random()*CW|0,r=Math.random()*CH|0;
   if(grid[r*CW+c]===0){grid[r*CW+c]=v;return[c,r]}}return null};
  for(let i=0;i<rocks;i++)put(1);
  for(let i=0;i<holes;i++)put(2);
  for(let i=0;i<nk;i++)put(4);
  const ex=put(3);if(!ex)continue;
  // start on a free bottom-ish cell
  let s=null;
  for(let i=0;i<60;i++){const c=Math.random()*CW|0,r=CH-1-(Math.random()*2|0);
   if(grid[r*CW+c]===0){s=[c,r];break}}
  if(!s)continue;
  const p=solvable(s[0],s[1]);
  if(p>=Math.min(3+(lvl/3|0),8)&&p<=24){
   pc=s[0];pr=s[1];par=p;keysTotal=nk;keys=0;got={};moves=0;return}}
 // fallback trivially solvable
 grid=new Array(CW*CH).fill(0);grid[1*CW+3]=3;pc=3;pr=CH-1;par=1;keysTotal=0;keys=0;got={};moves=0}
function reset(){lvl=1;falls=0;gen()}
addEventListener('pointerdown',e=>{e.preventDefault();
 if(state!=='play'){reset();state='play';return}
 swipe={x:e.clientX,y:e.clientY}});
addEventListener('pointerup',e=>{
 if(state!=='play'||!swipe||anim)return;
 const dx=e.clientX-swipe.x,dy=e.clientY-swipe.y;swipe=null;
 if(Math.hypot(dx,dy)<18)return;
 const d=Math.abs(dx)>Math.abs(dy)?(dx>0?0:2):(dy>0?1:3);
 const ks=new Set(Object.keys(got));
 const res=slideFrom(pc,pr,d,ks);
 if(res.c===pc&&res.r===pr)return;
 moves++;
 anim={fc:pc,fr:pr,tc:res.c,tr:res.r,u:0,res}});
let last=0;
function loop(ts){const dt=Math.min(.05,(ts-last)/1000||0);last=ts;t+=dt;
 if(anim){anim.u+=dt*6;
  if(anim.u>=1){const res=anim.res;pc=res.c;pr=res.r;anim=null;
   for(const k of res.col){got[k]=1;keys++}
   if(res.dead){falls++;gen()} // through the ice: fresh board, same level
   else if(res.exit&&keys>=keysTotal){lvl++;gen()}}}
 draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
function cell(){const cs=Math.min((W-24)/CW,(H-150)/CH);
 return{cs,ox:(W-cs*CW)/2,oy:110}}
function draw(){
 g.fillStyle='#0a1220';g.fillRect(0,0,W,H);
 const{cs,ox,oy}=cell();
 for(let r=0;r<CH;r++)for(let c=0;c<CW;c++){
  const x=ox+c*cs,y=oy+r*cs,v=grid[r*CW+c];
  g.fillStyle='#16283f';g.fillRect(x+1,y+1,cs-2,cs-2);
  g.fillStyle='rgba(160,210,255,.07)';g.fillRect(x+1,y+1,cs-2,(cs-2)*.4);
  if(v===1){g.fillStyle='#3b4a5e';g.fillRect(x+4,y+4,cs-8,cs-8);
   g.strokeStyle='#586b83';g.strokeRect(x+4,y+4,cs-8,cs-8)}
  if(v===2){g.fillStyle='#050a12';g.beginPath();g.arc(x+cs/2,y+cs/2,cs*.32,0,7);g.fill();
   g.strokeStyle='rgba(160,210,255,.3)';g.stroke()}
  if(v===3){g.strokeStyle=keys>=keysTotal?'#4ade80':'rgba(255,255,255,.3)';g.lineWidth=3;
   g.strokeRect(x+7,y+7,cs-14,cs-14);
   g.fillStyle=keys>=keysTotal?'#4ade80':'rgba(255,255,255,.3)';
   g.font='bold '+cs*.3+'px ui-monospace';g.textAlign='center';
   g.fillText(keys>=keysTotal?'EXIT':'🔒'.length?'···':'',x+cs/2,y+cs/2+5);
   if(keys<keysTotal)g.fillText(keysTotal-keys+'',x+cs/2,y+cs/2+5)}
  if(v===4&&!got[c+','+r]){g.fillStyle='#fde047';
   g.beginPath();g.arc(x+cs/2,y+cs*.4,cs*.14,0,7);g.fill();
   g.fillRect(x+cs/2-2,y+cs*.4,4,cs*.3)}
 }
 // penguin
 let px,py;
 if(anim){px=ox+(anim.fc+(anim.tc-anim.fc)*anim.u)*cs+cs/2;
  py=oy+(anim.fr+(anim.tr-anim.fr)*anim.u)*cs+cs/2}
 else{px=ox+pc*cs+cs/2;py=oy+pr*cs+cs/2}
 g.fillStyle='#1e293b';g.beginPath();g.ellipse(px,py,cs*.26,cs*.32,0,0,7);g.fill();
 g.fillStyle='#f8fafc';g.beginPath();g.ellipse(px,py+cs*.06,cs*.16,cs*.2,0,0,7);g.fill();
 g.fillStyle='#fb923c';g.beginPath();g.moveTo(px-4,py-cs*.14);g.lineTo(px+4,py-cs*.14);g.lineTo(px,py-cs*.05);g.fill();
 g.fillStyle='#0a1220';g.beginPath();g.arc(px-5,py-cs*.2,2,0,7);g.arc(px+5,py-cs*.2,2,0,7);g.fill();
 // HUD
 g.textAlign='left';g.fillStyle='#dbeafe';g.font='bold 20px ui-monospace';
 g.fillText('LEVEL '+lvl,14,34);
 g.font='12px ui-monospace';g.fillStyle='rgba(219,234,254,.6)';
 g.fillText('moves '+moves+' · par '+par+(keysTotal?' · keys '+keys+'/'+keysTotal:''),14,56);
 g.textAlign='right';g.fillText('falls '+falls,W-14,34);
 g.textAlign='center';g.fillStyle='rgba(219,234,254,.4)';g.font='10px ui-monospace';
 g.fillText('swipe to slide — you can\'t stop on ice',W/2,oy+CH*cs+24);
 if(state==='menu')title('FLOE','Swipe to slide — no stopping on ice.','Every level is generated, then PROVEN solvable. Endless.');
 if(state==='over')title('','','');
}
function title(a,b,c){if(!a)return;g.fillStyle='rgba(10,18,32,.87)';g.fillRect(0,0,W,H);
 g.fillStyle='#7dd3fc';g.font='bold '+Math.min(56,W/7)+'px ui-monospace,Menlo,monospace';g.textAlign='center';
 g.fillText(a,W/2,H*.4);g.fillStyle='#dbeafe';g.font='14px ui-monospace,Menlo,monospace';
 g.fillText(b,W/2,H*.4+40);g.fillStyle='rgba(219,234,254,.6)';g.fillText(c,W/2,H*.4+64)}
</script></body></html>
