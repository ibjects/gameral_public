<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Orbit</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0b0b16;touch-action:none;user-select:none;-webkit-user-select:none;font-family:ui-monospace,Menlo,monospace}canvas{display:block}</style>
</head><body><canvas></canvas><script>
// ORBIT — you circle the ring forever. Tap to reverse direction.
// Grab the star, dodge the thorns growing on the track.
const cv=document.querySelector('canvas'),g=cv.getContext('2d');let W,H;
function fit(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;g.setTransform(d,0,0,d,0,0)}
onresize=fit;fit();
const AC='#fca5a5',STAR='#fde047';
let state='menu',score=0,best=0,a=0,dir=1,om=1.9,spikes=[],star=null,spawnT=1,t=0,trail=[];
const CX=()=>W/2,CY=()=>H*.45,R=()=>Math.min(W,H)*.32;
function reset(){a=0;dir=1;om=1.9;spikes=[];star=null;spawnT=1;score=0;trail=[];placeStar()}
function angdiff(x,y){let d=(x-y)%(Math.PI*2);if(d>Math.PI)d-=Math.PI*2;if(d<-Math.PI)d+=Math.PI*2;return Math.abs(d)}
function placeStar(){let ok=false,ang;
 for(let i=0;i<40&&!ok;i++){ang=Math.random()*Math.PI*2;
  ok=angdiff(ang,a)>1&&spikes.every(s=>angdiff(ang,s.ang)>.5)}
 star={ang}}
addEventListener('pointerdown',e=>{e.preventDefault();
 if(state!=='play'){reset();state='play';return}
 dir*=-1});
let last=0;
function loop(ts){const dt=Math.min(.033,(ts-last)/1000||0);last=ts;t+=dt;update(dt);draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
function update(dt){if(state!=='play')return;
 om+=dt*.045;
 a+=dir*om*dt;
 trail.push({ang:a,life:1});for(const p of trail)p.life-=dt*2.2;trail=trail.filter(p=>p.life>0);
 spawnT-=dt;
 if(spawnT<=0&&spikes.length<3+Math.min(4,score/6|0)){spawnT=.9;
  let ang,ok=false;
  for(let i=0;i<40&&!ok;i++){ang=Math.random()*Math.PI*2;
   ok=angdiff(ang,a)>.9&&(!star||angdiff(ang,star.ang)>.45)&&spikes.every(s=>angdiff(ang,s.ang)>.45)}
  if(ok)spikes.push({ang,ph:-0.9,life:2.6+Math.random()*2})}
 for(const s of spikes){s.ph+=dt;
  if(s.ph>0){s.life-=dt;
   if(angdiff(a,s.ang)<.1){state='over';best=Math.max(best,score);return}}}
 spikes=spikes.filter(s=>s.life>0);
 if(star&&angdiff(a,star.ang)<.14){score++;placeStar()}
}
function ringPt(ang,r){return[CX()+Math.cos(ang)*r,CY()+Math.sin(ang)*r]}
function draw(){
 g.fillStyle='#0b0b16';g.fillRect(0,0,W,H);
 const r=R();
 g.strokeStyle='rgba(255,255,255,.2)';g.lineWidth=3;
 g.beginPath();g.arc(CX(),CY(),r,0,7);g.stroke();
 // spikes
 for(const s of spikes){
  const[px,py]=ringPt(s.ang,r),[ix,iy]=ringPt(s.ang,r-24);
  if(s.ph<0){ // warning
   g.globalAlpha=.3+.5*Math.abs(Math.sin(t*10));g.strokeStyle=AC;g.lineWidth=2;
   g.beginPath();g.arc(px,py,10,0,7);g.stroke();g.globalAlpha=1;
  }else{
   const[l1x,l1y]=ringPt(s.ang-.07,r),[l2x,l2y]=ringPt(s.ang+.07,r);
   g.fillStyle=AC;g.beginPath();g.moveTo(l1x,l1y);g.lineTo(l2x,l2y);g.lineTo(ix,iy);g.closePath();g.fill();
  }}
 // star
 if(star&&state==='play'){const[sx,sy]=ringPt(star.ang,r);
  g.save();g.translate(sx,sy);g.rotate(t*2);g.fillStyle=STAR;
  g.beginPath();for(let i=0;i<10;i++){const rr=i%2?4:10,an=i*Math.PI/5;
   g.lineTo(Math.cos(an)*rr,Math.sin(an)*rr)}g.closePath();g.fill();g.restore()}
 // trail + dot
 for(const p of trail){const[tx,ty]=ringPt(p.ang,r);
  g.globalAlpha=p.life*.4;g.fillStyle='#fff';g.beginPath();g.arc(tx,ty,5*p.life,0,7);g.fill()}
 g.globalAlpha=1;
 if(state!=='menu'){const[px,py]=ringPt(a,r);
  g.fillStyle='#fff';g.beginPath();g.arc(px,py,9,0,7);g.fill()}
 // HUD
 g.textAlign='center';g.fillStyle='#f4f1fb';
 g.font='bold 34px ui-monospace,Menlo,monospace';g.fillText(score,CX(),CY()+12);
 if(state==='menu')title('ORBIT','You never stop moving. Tap to reverse.','Catch stars · thorns flash before they grow');
 if(state==='over')title('THORNED','Score '+score+' · Best '+best,'Tap to spin again');
}
function title(a2,b,c){g.fillStyle='rgba(11,11,22,.75)';g.fillRect(0,0,W,H);
 g.fillStyle='#f4f1fb';g.font='bold '+Math.min(52,W/8)+'px ui-monospace,Menlo,monospace';g.textAlign='center';
 g.fillText(a2,W/2,H*.42);g.font='14px ui-monospace,Menlo,monospace';
 g.fillText(b,W/2,H*.42+40);g.fillStyle='rgba(244,241,251,.6)';g.fillText(c,W/2,H*.42+64)}
</script></body></html>
