<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bloom</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#100e0c;touch-action:none;user-select:none;-webkit-user-select:none;font-family:ui-monospace,Menlo,monospace}canvas{display:block}</style>
</head><body><canvas></canvas><script>
// BLOOM — a bonsai that grows in real time, wherever it pleases. You only hold the shears.
// Leaves in the sun feed it; wood costs energy; lopsided weight snaps the trunk. Prune wisely.
const cv=document.querySelector('canvas'),g=cv.getContext('2d');let W,H;
function fit(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;g.setTransform(d,0,0,d,0,0)}
onresize=fit;fit();
let state='menu',days=0,best=0,segs=[],E=30,growT=0,t=0,wind=0,windT=99,warnT=0,snip=[],peakLeaves=0,wiltT=0;
const RX=()=>W/2,RY=()=>H-90;
function reset(){days=0;E=30;wind=0;windT=14;warnT=0;snip=[];peakLeaves=0;wiltT=0;
 segs=[{x1:RX(),y1:RY(),x2:RX(),y2:RY()-60,ang:-1.5708,d:0,p:null}];growT=1}
addEventListener('pointerdown',e=>{e.preventDefault();
 if(state!=='play'){reset();state='play';return}
 // find nearest prunable segment (never the root)
 let bs=null,bd=26;
 for(const s of segs){if(s.p===null)continue;
  const mx=(s.x1+s.x2)/2,my=(s.y1+s.y2)/2;
  const d=Math.hypot(mx-e.clientX,my-e.clientY);
  if(d<bd){bd=d;bs=s}}
 if(bs){ // remove subtree by reference
  const dead=new Set([bs]);let grew=true;
  while(grew){grew=false;
   for(const s of segs)if(!dead.has(s)&&dead.has(s.p)){dead.add(s);grew=true}}
  for(const s of dead)snip.push({x:(s.x1+s.x2)/2,y:(s.y1+s.y2)/2,a:1});
  segs=segs.filter(s=>!dead.has(s));
 }});
let last=0;
function loop(ts){const dt=Math.min(.05,(ts-last)/1000||0);last=ts;t+=dt;update(dt);draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
function sunX(){return W/2+Math.sin(t*.12)*W*.42}
function update(dt){if(state!=='play')return;
 days+=dt/5;
 // wind gusts
 windT-=dt;
 if(windT<=0&&wind===0){warnT=2.5;windT=999}
 if(warnT>0){warnT-=dt;if(warnT<=0){wind=(Math.random()<.5?-1:1)*(1400+days*40);windT=4}}
 else if(wind!==0){windT-=dt;if(windT<=0){wind=0;windT=12+Math.random()*10}}
 // growth
 growT-=dt;
 if(growT<=0&&segs.length<130){growT=Math.max(.5,1.3-days*.008);
  const hasKid=new Set(segs.map(s=>s.p));
  const tipSegs=segs.filter(s=>!hasKid.has(s)&&s.d<8);
  if(tipSegs.length){const p=tipSegs[Math.random()*tipSegs.length|0];
   const n=Math.random()<.3?2:1;
   for(let k=0;k<n;k++){
    const ang=p.ang+(Math.random()-.5)*1.2+(k?0.5:0);
    const len=Math.max(14,34*Math.pow(.92,p.d));
    // bias upward a touch
    const a2=ang*.85+(-1.5708)*.15;
    segs.push({x1:p.x2,y1:p.y2,x2:p.x2+Math.cos(a2)*len,y2:p.y2+Math.sin(a2)*len,
     ang:a2,d:p.d+1,p:p})}}}
 // energy: leaves earn (sun side + height), wood costs
 const hasKid=new Set(segs.map(s=>s.p));
 let earn=0,leaves=0;const sx=sunX();
 segs.forEach(s=>{if(!hasKid.has(s)){leaves++;
  const sunSide=1-Math.min(1,Math.abs(s.x2-sx)/(W*.7));
  const height=(RY()-s.y2)/H;
  earn+=.24+.5*sunSide+.4*height}});
 peakLeaves=Math.max(peakLeaves,leaves);
 E+=(earn-segs.length*.075)*dt*2.2;E=Math.min(100,E);
 if(E<0){wiltT+=dt;if(wiltT>6){over('WITHERED')}}else wiltT=0;
 // balance
 let torque=0;
 for(const s of segs)torque+=((s.x1+s.x2)/2-RX());
 torque+=wind;
 if(Math.abs(torque)>W*4.2)over('SNAPPED');
 for(const p of snip)p.a-=dt*1.6;snip=snip.filter(p=>p.a>0);
 curTorque=torque;
}
let curTorque=0;
function over(m){overMsg=m;state='over';best=Math.max(best,Math.floor(days))}
let overMsg='';
function draw(){
 // dusk room
 const bg=g.createLinearGradient(0,0,0,H);
 bg.addColorStop(0,'#191410');bg.addColorStop(1,'#0d0b09');
 g.fillStyle=bg;g.fillRect(0,0,W,H);
 // sun
 const sx=sunX();
 g.fillStyle='rgba(255,200,110,.9)';g.beginPath();g.arc(sx,70,20,0,7);g.fill();
 g.fillStyle='rgba(255,200,110,.08)';g.beginPath();g.arc(sx,70,90,0,7);g.fill();
 // pot
 g.fillStyle='#7c4a2d';g.fillRect(RX()-60,RY(),120,26);
 g.fillRect(RX()-48,RY()+26,96,14);
 // tree
 const hasKid=new Set(segs.map(s=>s.p));
 const sway=wind?Math.sin(t*7)*3*Math.sign(wind):0;
 segs.forEach(s=>{
  g.strokeStyle=E<0?'#6b5a3e':'#8a5a35';
  g.lineWidth=Math.max(1.5,9-s.d*1.1);g.lineCap='round';
  g.beginPath();g.moveTo(s.x1+sway*s.d*.2,s.y1);g.lineTo(s.x2+sway*(s.d+1)*.2,s.y2);g.stroke();
  if(!hasKid.has(s)){
   const sunSide=1-Math.min(1,Math.abs(s.x2-sx)/(W*.7));
   g.fillStyle=E<0?'#8b7c4a':'rgb('+(90+sunSide*60)+','+(150+sunSide*70)+',90)';
   g.beginPath();g.arc(s.x2+sway*(s.d+1)*.2,s.y2,7+sunSide*3,0,7);g.fill();
   if(Math.random()<.008){g.fillStyle='#f9a8d4';g.beginPath();g.arc(s.x2,s.y2-4,3,0,7);g.fill()}}
 });
 for(const p of snip){g.globalAlpha=p.a;g.fillStyle='#9db860';
  g.beginPath();g.arc(p.x,p.y+(1-p.a)*30,4,0,7);g.fill()}
 g.globalAlpha=1;
 // wind warning / active
 if(warnT>0){g.fillStyle='rgba(255,255,255,'+(0.4+0.4*Math.sin(t*10))+')';
  g.font='bold 14px ui-monospace';g.textAlign='center';g.fillText('~ WIND RISING ~',W/2,H*.3)}
 if(wind!==0){g.strokeStyle='rgba(255,255,255,.25)';
  for(let i=0;i<5;i++){const y=100+i*60,x=(t*300*Math.sign(wind)+i*140)%(W+100);
   const xx=((x%(W+100))+W+100)%(W+100)-50;
   g.beginPath();g.moveTo(xx,y);g.lineTo(xx+40*Math.sign(wind),y);g.stroke()}}
 // HUD
 g.textAlign='left';g.fillStyle='#f2ead9';g.font='bold 18px ui-monospace';
 g.fillText('day '+Math.floor(days),12,30);
 // energy bar
 g.fillStyle='rgba(255,255,255,.14)';g.fillRect(12,42,130,9);
 g.fillStyle=E>25?'#9db860':'#f87171';g.fillRect(12,42,130*Math.max(0,E)/100,9);
 g.fillStyle='rgba(242,234,217,.5)';g.font='9px ui-monospace';g.fillText('sap',148,50);
 // balance needle
 const bx=W-90,lim=W*4.2;
 g.fillStyle='rgba(255,255,255,.14)';g.fillRect(bx,42,76,9);
 g.fillStyle='#f2ead9';
 const off=Math.max(-1,Math.min(1,curTorque/lim));
 g.fillRect(bx+38+off*36-2,39,4,15);
 g.fillStyle=Math.abs(off)>.75?'#f87171':'rgba(242,234,217,.5)';g.fillText('balance',bx,62);
 g.textAlign='center';g.fillStyle='rgba(242,234,217,.4)';g.font='10px ui-monospace';
 g.fillText('tap a branch to prune it (and everything past it)',W/2,H-16);
 if(state==='menu')title('BLOOM','Your bonsai grows wherever it likes, in real time.','Sunlit leaves feed it. Wood drains it. Lopsided = SNAP.');
 if(state==='over')title(overMsg,'Tended '+Math.floor(days)+' days · peak '+peakLeaves+' leaves · best '+best,'Tap to plant again');
}
function title(a,b,c){g.fillStyle='rgba(16,14,12,.85)';g.fillRect(0,0,W,H);
 g.fillStyle='#9db860';g.font='bold '+Math.min(52,W/8)+'px ui-monospace,Menlo,monospace';g.textAlign='center';
 g.fillText(a,W/2,H*.4);g.fillStyle='#f2ead9';g.font='13px ui-monospace,Menlo,monospace';
 g.fillText(b,W/2,H*.4+40);g.fillStyle='rgba(242,234,217,.6)';g.fillText(c,W/2,H*.4+62)}
</script></body></html>
