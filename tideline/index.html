<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tideline</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0c1420;touch-action:none;user-select:none;-webkit-user-select:none;font-family:ui-monospace,Menlo,monospace}canvas{display:block}</style>
</head><body><canvas></canvas><script>
// TIDELINE — the tide is coming in and your sandcastle is not moving.
// Between waves you get seconds and a handful of sand: draw walls. Water erodes them.
const cv=document.querySelector('canvas'),g=cv.getContext('2d');let W,H;
function fit(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;g.setTransform(d,0,0,d,0,0)}
onresize=fit;fit();
const SAND='#e7c27d',SEA='#4fc3f7';
let state='menu',wave=0,best=0,phase='build',buildT=6,segs=[],drops=[],castleHP=5,budget=480,used=0,strokePrev=null,t=0,foam=[];
function reset(){wave=0;phase='build';buildT=6;segs=[];drops=[];castleHP=5;budget=480;used=0}
const CAST=()=>({x:W/2,y:H-64,r:34});
addEventListener('pointerdown',e=>{e.preventDefault();
 if(state!=='play'){reset();state='play';return}
 if(phase==='build')strokePrev={x:e.clientX,y:e.clientY}});
addEventListener('pointermove',e=>{
 if(state!=='play'||phase!=='build'||!strokePrev)return;
 const d=Math.hypot(e.clientX-strokePrev.x,e.clientY-strokePrev.y);
 if(d>10&&used+d<=budget&&e.clientY>110&&e.clientY<H-30){
  segs.push({x1:strokePrev.x,y1:strokePrev.y,x2:e.clientX,y2:e.clientY,hp:3});
  used+=d;strokePrev={x:e.clientX,y:e.clientY}}});
addEventListener('pointerup',()=>strokePrev=null);
let last=0;
function loop(ts){const dt=Math.min(.033,(ts-last)/1000||0);last=ts;t+=dt;update(dt);draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
function launchWave(){wave++;drops=[];
 const n=7+wave*3;
 for(let i=0;i<n;i++)drops.push({x:Math.random()*W,y:-20-Math.random()*220,
  vy:110+Math.random()*60+wave*7,ph:Math.random()*7})}
function update(dt){if(state!=='play')return;
 if(phase==='build'){buildT-=dt;
  if(buildT<=0){phase='wave';launchWave()}return}
 for(const d of drops){d.y+=d.vy*dt;d.x+=Math.sin(t*3+d.ph)*30*dt;
  if(d.x<0)d.x=0;if(d.x>W)d.x=W;
  // hit walls
  for(const s of segs){
   const abx=s.x2-s.x1,aby=s.y2-s.y1,l2=abx*abx+aby*aby||1;
   let u=((d.x-s.x1)*abx+(d.y-s.y1)*aby)/l2;u=Math.max(0,Math.min(1,u));
   const cx=s.x1+abx*u,cy=s.y1+aby*u;
   if(Math.hypot(d.x-cx,d.y-cy)<9){s.hp--;d.dead=true;foam.push({x:d.x,y:d.y,a:1});break}}
  if(d.dead)continue;
  const c=CAST();
  if(Math.hypot(d.x-c.x,d.y-c.y)<c.r){castleHP--;d.dead=true;foam.push({x:d.x,y:d.y,a:1});
   if(castleHP<=0){state='over';best=Math.max(best,wave-1);return}}
  if(d.y>H)d.dead=true;
 }
 drops=drops.filter(d=>!d.dead);
 segs=segs.filter(s=>s.hp>0);
 for(const f of foam)f.a-=dt*2;foam=foam.filter(f=>f.a>0);
 if(!drops.length){phase='build';buildT=5;budget=400;used=0}
}
function draw(){
 // beach gradient
 const bg=g.createLinearGradient(0,0,0,H);
 bg.addColorStop(0,'#123048');bg.addColorStop(.35,'#274a63');bg.addColorStop(.5,'#c9a86a');bg.addColorStop(1,'#a8854b');
 g.fillStyle=bg;g.fillRect(0,0,W,H);
 // shimmer on the sea
 g.strokeStyle='rgba(255,255,255,.12)';
 for(let i=0;i<8;i++){const y=20+i*12+Math.sin(t*2+i)*3;
  g.beginPath();g.moveTo((i*80+t*40)%W,y);g.lineTo((i*80+t*40)%W+40,y);g.stroke()}
 // castle
 const c=CAST();
 g.fillStyle='#d9b06b';
 g.fillRect(c.x-30,c.y-8,60,34);
 for(const dx of[-30,-10,10])g.fillRect(c.x+dx,c.y-16,8,10);
 g.beginPath();g.moveTo(c.x-14,c.y-8);g.lineTo(c.x,c.y-38);g.lineTo(c.x+14,c.y-8);g.closePath();g.fill();
 g.strokeStyle='#8a6a38';g.strokeRect(c.x-30,c.y-8,60,34);
 g.fillStyle='#f87171';g.beginPath();g.moveTo(c.x,c.y-38);g.lineTo(c.x+11,c.y-33);g.lineTo(c.x,c.y-28);g.closePath();g.fill();
 // walls
 for(const s of segs){g.strokeStyle=['#7a5c2e','#b08d4d',SAND][s.hp-1]||SAND;
  g.lineWidth=7;g.lineCap='round';
  g.beginPath();g.moveTo(s.x1,s.y1);g.lineTo(s.x2,s.y2);g.stroke()}
 // water drops
 for(const d of drops){g.fillStyle=SEA;
  g.beginPath();g.arc(d.x,d.y,6,0,7);g.fill();
  g.fillStyle='rgba(255,255,255,.5)';g.beginPath();g.arc(d.x-2,d.y-2,2,0,7);g.fill()}
 for(const f of foam){g.globalAlpha=f.a;g.strokeStyle='#fff';
  g.beginPath();g.arc(f.x,f.y,(1-f.a)*16+4,0,7);g.stroke()}
 g.globalAlpha=1;
 // HUD
 g.textAlign='center';g.fillStyle='#fff7e6';
 g.font='bold 26px ui-monospace,Menlo,monospace';g.fillText('WAVE '+wave,W/2,42);
 g.font='13px ui-monospace';g.fillText('castle '+'♥'.repeat(Math.max(0,castleHP)),W/2,64);
 if(phase==='build'&&state==='play'){
  g.fillStyle='rgba(0,0,0,.35)';g.fillRect(0,84,W,30);
  g.fillStyle='#fff7e6';g.fillText('BUILD! wave in '+Math.ceil(buildT)+'s',W/2,105);
  const bw=Math.min(220,W-60);
  g.fillStyle='rgba(255,255,255,.2)';g.fillRect(W/2-bw/2,H-22,bw,7);
  g.fillStyle=SAND;g.fillRect(W/2-bw/2,H-22,bw*Math.max(0,budget-used)/budget,7)}
 if(state==='menu')title('TIDELINE','The tide is coming for your sandcastle.','Between waves, draw sand walls. Water erodes them.');
 if(state==='over')title('WASHED AWAY','Survived '+(wave-1)+' waves · Best '+best,'Tap to rebuild at low tide');
}
function title(a,b,c){g.fillStyle='rgba(12,20,32,.78)';g.fillRect(0,0,W,H);
 g.fillStyle=SAND;g.font='bold '+Math.min(48,W/9)+'px ui-monospace,Menlo,monospace';g.textAlign='center';
 g.fillText(a,W/2,H*.4);g.fillStyle='#fff7e6';g.font='14px ui-monospace,Menlo,monospace';
 g.fillText(b,W/2,H*.4+40);g.fillStyle='rgba(255,247,230,.6)';g.fillText(c,W/2,H*.4+64)}
</script></body></html>
