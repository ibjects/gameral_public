                    drawBar(pad, y, barW, barH, clamp(engDisplay / 100, 0, 1), C.success, "ENGAGEMENT", engDisplay);
                    drawBar(pad * 2 + barW, y, barW, barH, clamp(stabDisplay / 100, 0, 1), C.accent, "STABILITY", stabDisplay);
                    drawBar(pad * 3 + barW * 2, y, barW, barH, clamp(funDisplay / 100, 0, 1), C.warn, "FUNDING", funDisplay);
                    return barH + Math.max(16, H * 0.025);
                }

                function drawPostCard(y0) {
                    if (!curPost) return 0;
                    var p = curPost;
                    var pad = Math.max(12, W * 0.03);
                    var cardW = W - pad * 2;
                    var cardH = Math.min(H * 0.46, 340);
                    var cx0 = pad, cy0 = y0;

                    /* slide animation */
                    var slideOff = 0;
                    if (subPhase === "transition") {
                        slideOff = -W * Math.min(1, transT / 0.3);
                    }
                    ctx.save(); ctx.translate(slideOff, 0);

                    /* card bg */
                    rrect(cx0, cy0, cardW, cardH, 10);
                    ctx.fillStyle = C.panel; ctx.fill();
                    ctx.lineWidth = 1.5; ctx.strokeStyle = C.border; ctx.stroke();

                    /* category accent bar */
                    var catCol = CAT_COL[p.cat] || C.dim;
                    ctx.fillStyle = catCol; ctx.fillRect(cx0, cy0 + 10, 4, cardH - 20);

                    /* action flash overlay */
                    if (actionFlash > 0 && subPhase === "transition") {
                        rrect(cx0, cy0, cardW, cardH, 10);
                        ctx.fillStyle = flashCol; ctx.globalAlpha = actionFlash * 0.15; ctx.fill(); ctx.globalAlpha = 1;
                    }

                    var tx = cx0 + 20, ty = cy0 + 16;
                    /* avatar */
                    ctx.beginPath(); ctx.arc(tx + 14, ty + 14, 14, 0, Math.PI * 2);
                    ctx.fillStyle = catCol; ctx.fill();
                    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.font = "700 11px system-ui"; ctx.fillText(p.ic, tx + 14, ty + 14);

                    /* username + tag */
                    ctx.textAlign = "left"; ctx.textBaseline = "top";
                    ctx.fillStyle = C.text; ctx.font = "700 " + Math.max(12, cardW * 0.038) + "px system-ui";
                    ctx.fillText(p.a, tx + 36, ty + 2);
                    ctx.fillStyle = catCol; ctx.font = "600 " + Math.max(10, cardW * 0.028) + "px system-ui";
                    ctx.fillText(p.tag, tx + 36, ty + 20);

                    /* post text */
                    ctx.fillStyle = C.text; ctx.font = "500 " + Math.max(13, cardW * 0.04) + "px system-ui";
                    var maxTW = cardW - 48;
                    var lines = wrapText(p.tx, maxTW);
                    var lineH = Math.max(17, cardW * 0.05);
                    var textY = ty + 44;
                    for (var i = 0; i < Math.min(lines.length, 5); i++) {
                        ctx.fillText(lines[i], tx + 4, textY + i * lineH);
                    }

                    /* engagement stats */
                    var statY = textY + Math.min(lines.length, 5) * lineH + 10;
                    ctx.fillStyle = C.dim; ctx.font = "500 " + Math.max(11, cardW * 0.03) + "px system-ui";
                    ctx.fillText("\u2764\ufe0f " + fmtNum(p.lk) + "   \ud83d\udd01 " + fmtNum(p.sh) + "   \ud83d\udcac " + fmtNum(p.cm), tx + 4, statY);

                    /* analysis bars */
                    var abY = statY + Math.max(22, cardW * 0.06);
                    var abW = cardW * 0.35, abH = 6;
                    ctx.fillStyle = C.dim; ctx.font = "600 " + Math.max(10, cardW * 0.025) + "px system-ui";
                    ctx.fillText("Outrage", tx + 4, abY - 2);
                    rrect(tx + 4 + 60, abY, abW, abH, 3); ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fill();
                    rrect(tx + 4 + 60, abY, Math.max(abH, abW * p.o), abH, 3); ctx.fillStyle = C.danger; ctx.fill();
                    ctx.fillStyle = C.dim; ctx.fillText("Truth", tx + 4, abY + 18);
                    rrect(tx + 4 + 60, abY + 18, abW, abH, 3); ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fill();
                    rrect(tx + 4 + 60, abY + 18, Math.max(abH, abW * p.tr), abH, 3); ctx.fillStyle = C.success; ctx.fill();
                    ctx.fillStyle = C.dim; ctx.fillText("Viral", tx + 4, abY + 36);
                    rrect(tx + 4 + 60, abY + 36, abW, abH, 3); ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fill();
                    rrect(tx + 4 + 60, abY + 36, Math.max(abH, abW * p.v), abH, 3); ctx.fillStyle = C.cyan; ctx.fill();

                    /* post timer bar */
                    if (subPhase === "active") {
                        var timerY = cy0 + cardH - 14;
                        var pct = clamp(postTimer / postTimerMax, 0, 1);
                        rrect(cx0 + 12, timerY, cardW - 24, 6, 3); ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fill();
                        var tCol = pct < 0.5 ? C.success : pct < 0.8 ? C.warn : C.danger;
                        rrect(cx0 + 12, timerY, Math.max(6, (cardW - 24) * pct), 6, 3); ctx.fillStyle = tCol; ctx.fill();
                    }

                    /* action label during transition */
                    if (subPhase === "transition" && actionTaken) {
                        ctx.fillStyle = flashCol; ctx.globalAlpha = clamp(1 - transT * 2, 0, 1);
                        ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        ctx.font = "800 " + Math.max(20, cardW * 0.07) + "px system-ui";
                        ctx.fillText(actionTaken, cx0 + cardW / 2, cy0 + cardH / 2);
                        ctx.globalAlpha = 1;
                    }

                    ctx.restore();
                    return cardH;
                }

                function wrapText(text, maxW) {
                    var words = text.split(" "); var lines = []; var cur = "";
                    for (var i = 0; i < words.length; i++) {
                        var test = cur ? cur + " " + words[i] : words[i];
                        var m = ctx.measureText(test);
                        var tw = (m && m.width) ? m.width : test.length * 7;
                        if (tw > maxW && cur) { lines.push(cur); cur = words[i]; }
                        else cur = test;
                    }
                    if (cur) lines.push(cur); return lines;
                }

                /* action buttons */
                var btnDefs = [
                    { label: "AMPLIFY", icon: "\ud83d\udce2", col: C.success, act: "amplify", key: "1/A" },
                    { label: "SUPPRESS", icon: "\ud83d\udeab", col: C.danger, act: "suppress", key: "2/S" },
                    { label: "MONETIZE", icon: "\ud83d\udcb0", col: C.warn, act: "monetize", key: "3/D" },
                ];
                var btnRects = [];

                function drawButtons(y0) {
                    var pad = Math.max(12, W * 0.03);
                    var gap = Math.max(8, W * 0.02);
                    var totalW = W - pad * 2;
                    var btnW = (totalW - gap * 2) / 3;
                    var btnH = Math.min(62, H * 0.08);
                    btnRects = [];
                    for (var i = 0; i < 3; i++) {
                        var bx = pad + i * (btnW + gap);
                        var by = y0;
                        btnRects.push({ x: bx, y: by, w: btnW, h: btnH });
                        var hover = hoverBtn === i;
                        var d = btnDefs[i];
                        ctx.save();
                        if (hover) { ctx.shadowBlur = 14; ctx.shadowColor = d.col; }
                        rrect(bx, by, btnW, btnH, 8);
                        ctx.fillStyle = hover ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.03)"; ctx.fill();
                        ctx.lineWidth = 1.5; ctx.strokeStyle = hover ? d.col : C.border; ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = d.col; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        ctx.font = "700 " + Math.max(13, btnH * 0.30) + "px system-ui";
                        ctx.fillText(d.icon + " " + d.label, bx + btnW / 2, by + btnH * 0.42);
                        ctx.fillStyle = C.dim; ctx.font = "500 " + Math.max(9, btnH * 0.20) + "px system-ui";
                        ctx.fillText(isTouch ? "tap" : d.key, bx + btnW / 2, by + btnH * 0.76);
                        ctx.restore();
                    }
                    return btnH;
                }

                function drawScore(y0) {
                    ctx.fillStyle = C.dim; ctx.textAlign = "left"; ctx.textBaseline = "top";
                    ctx.font = "600 " + Math.max(11, W * 0.03) + "px system-ui";
                    ctx.fillText("\ud83d\udcca Score: " + score, Math.max(12, W * 0.03), y0);
                    ctx.textAlign = "right";
                    ctx.fillText("\ud83c\udfc6 Best: " + best, W - Math.max(12, W * 0.03), y0);
                }

                function drawNotifications() {
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    for (var i = 0; i < notifications.length; i++) {
                        var n = notifications[i];
                        var ny = H * 0.12 + i * Math.max(30, H * 0.04);
                        ctx.globalAlpha = clamp(n.life / 0.8, 0, 1) * 0.95;
                        rrect(W * 0.1, ny, W * 0.8, Math.max(28, H * 0.035), 6);
                        ctx.fillStyle = "rgba(22,27,34,0.92)"; ctx.fill();
                        ctx.lineWidth = 1; ctx.strokeStyle = n.col; ctx.stroke();
                        ctx.fillStyle = n.col; ctx.font = "600 " + Math.max(11, W * 0.028) + "px system-ui";
                        ctx.fillText(n.text, W / 2, ny + Math.max(14, H * 0.018));
                    }
                    ctx.globalAlpha = 1;
                }

                function drawParticles() {
                    for (var i = 0; i < particles.length; i++) {
                        var p = particles[i];
                        ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.col;
                        ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
                    }
                    ctx.globalAlpha = 1;
                }

                function drawOverlay(title, sub, sub2) {
                    ctx.fillStyle = "rgba(13,17,23,0.80)"; ctx.fillRect(0, 0, W, H);
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillStyle = C.text; ctx.shadowBlur = 24; ctx.shadowColor = C.accent;
                    ctx.font = "800 " + clamp(W * 0.095, 28, 60) + "px system-ui";
                    ctx.fillText(title, W / 2, H * 0.35); ctx.shadowBlur = 0;
                    if (sub) {
                        ctx.fillStyle = "rgba(230,237,243,0.88)";
                        ctx.font = "600 " + clamp(W * 0.038, 14, 24) + "px system-ui";
                        ctx.fillText(sub, W / 2, H * 0.35 + clamp(W * 0.08, 36, 58));
                    }
                    if (sub2) {
                        ctx.fillStyle = C.dim;
                        ctx.font = "500 " + clamp(W * 0.03, 11, 17) + "px system-ui";
                        var lines = sub2.split("\n");
                        for (var i = 0; i < lines.length; i++)
                            ctx.fillText(lines[i], W / 2, H * 0.35 + clamp(W * 0.14, 64, 100) + i * clamp(W * 0.04, 18, 24));
                    }
                }

                /* scanline effect when stability is low */
                function drawGlitch() {
                    if (stability > 30) return;
                    var intensity = (30 - stability) / 30;
                    for (var i = 0; i < 3; i++) {
                        if (Math.random() < intensity * 0.3) {
                            var sy = Math.random() * H, sh = 2 + Math.random() * 4;
                            ctx.fillStyle = "rgba(248,81,73," + (intensity * 0.08) + ")";
                            ctx.fillRect(0, sy, W, sh);
                        }
                    }
                    /* CRT scanlines */
                    ctx.fillStyle = "rgba(0,0,0," + (intensity * 0.04) + ")";
                    for (var y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
                }

                /* ═══ MAIN FRAME ═══ */
                var booted = false, lastT = performance.now();
                function frame(now) {
                    if (!booted) { booted = true; var b = document.getElementById("boot"); if (b) b.style.display = "none"; }
                    var dt = (now - lastT) / 1000; lastT = now; if (dt > 0.06) dt = 0.06;
                    update(dt);

                    ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);

                    ctx.save();
                    if (shake > 0) { var s = shake; ctx.translate(rnd(-s, s), rnd(-s, s)); }

                    if (state === S_PLAY) {
                        var y = drawTitleBar();
                        y += 8;
                        y += drawMetrics(y + 16);
                        y += 8;
                        var cardH = drawPostCard(y);
                        y += cardH + Math.max(10, H * 0.015);
                        var btnH = drawButtons(y);
                        y += btnH + Math.max(8, H * 0.01);
                        drawScore(y);
                        drawNotifications();
                        drawParticles();
                        drawGlitch();
                    } else if (state === S_START) {
                        drawTitleBar();
                        drawOverlay("ECHO CHAMBER",
                            isTouch ? "Tap to Start Your Shift" : "Click to Start Your Shift",
                            "You are an AI moderator for NEXUS, the world's\nlargest social network. Curate the algorithm.\nKeep users addicted without starting a civil war.\n\nBalance ENGAGEMENT, STABILITY, and FUNDING.\nIf any meter hits zero, it's game over.");
                    } else if (state === S_OVER) {
                        drawTitleBar();
                        drawParticles();
                        drawOverlay("SYSTEM SHUTDOWN",
                            overReason,
                            "Score: " + score + "  |  Posts: " + postsProcessed + "  |  Best: " + best + "\n\nDay " +
                            (Math.floor(elapsed / 30) + 1) + "  |  Survived " + fmtTime(elapsed) + "\n\n" +
                            (goCooldown > 0 ? "..." : (isTouch ? "Tap to Restart" : "Click / Space to Restart")));
                    }

                    ctx.restore();
                    if (flash > 0) { ctx.fillStyle = flashCol; ctx.globalAlpha = flash * 0.3; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);

                /* ═══ INPUT ═══ */
                function cXY(e) { var r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
                function hitBtn(x, y) {
                    for (var i = 0; i < btnRects.length; i++) {
                        var b = btnRects[i];
                        if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return i;
                    }
                    return -1;
                }
                function onDown(x, y) {
                    if (state === S_START) { startGame(); return; }
                    if (state === S_OVER) { if (goCooldown <= 0) startGame(); return; }
                    var b = hitBtn(x, y);
                    if (b >= 0) doAction(btnDefs[b].act);
                }
                function onMove(x, y) { hoverBtn = hitBtn(x, y); }

                if (window.PointerEvent) {
                    canvas.addEventListener("pointerdown", function (e) { e.preventDefault(); var p = cXY(e); onDown(p.x, p.y); }, { passive: false });
                    canvas.addEventListener("pointermove", function (e) { var p = cXY(e); onMove(p.x, p.y); }, { passive: false });
                } else {
                    canvas.addEventListener("mousedown", function (e) { e.preventDefault(); var p = cXY(e); onDown(p.x, p.y); });
                    canvas.addEventListener("mousemove", function (e) { var p = cXY(e); onMove(p.x, p.y); });
                    canvas.addEventListener("touchstart", function (e) { e.preventDefault(); var t = e.changedTouches[0]; var p = cXY(t); onDown(p.x, p.y); }, { passive: false });
                }
                window.addEventListener("keydown", function (e) {
                    if (state === S_START) { if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); startGame(); } return; }
                    if (state === S_OVER) { if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); if (goCooldown <= 0) startGame(); } return; }
                    switch (e.code) {
                        case "Digit1": case "KeyA": e.preventDefault(); doAction("amplify"); break;
                        case "Digit2": case "KeyS": e.preventDefault(); doAction("suppress"); break;
                        case "Digit3": case "KeyD": e.preventDefault(); doAction("monetize"); break;
                    }
                }, { passive: false });

            })();
        } catch (e) { showErr((e && e.stack) || ("" + e)); }
    </script>
</body>

</html>
