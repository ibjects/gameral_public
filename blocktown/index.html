<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Blocktown — AI Director</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #101216;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: ui-monospace, Menlo, monospace
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0
    }

    /* ============ UI KIT (atomic design) ============
   atoms: .a-text .a-stat .a-badge .a-bar .a-btn
   molecules: .m-panel .m-toast .m-card .m-modal
   organisms: slot containers (#sl-*) composed at runtime          */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5
    }

    .slot {
      position: fixed;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 46vw
    }

    #sl-tl {
      top: 10px;
      left: 10px
    }

    #sl-tc {
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      align-items: center
    }

    #sl-tr {
      top: 10px;
      right: 10px;
      align-items: flex-end
    }

    #sl-bc {
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      align-items: center;
      max-width: 92vw
    }

    #sl-bl {
      bottom: 12px;
      left: 10px;
      max-width: 58vw
    }

    .a-text {
      color: #e7e9ee;
      font-size: 12px;
      line-height: 1.45;
      text-shadow: 0 1px 2px #000
    }

    .a-stat {
      display: flex;
      gap: 7px;
      align-items: baseline;
      text-shadow: 0 1px 2px #000
    }

    .a-stat .lb {
      font-size: 10px;
      letter-spacing: .14em;
      color: #8b8fa3
    }

    .a-stat .vl {
      font-size: 19px;
      font-weight: 800;
      color: #ffd166
    }

    .a-badge {
      font-size: 15px;
      letter-spacing: .1em;
      color: #f87171;
      text-shadow: 0 1px 2px #000
    }

    .a-bar {
      width: 120px;
      height: 7px;
      background: rgba(255, 255, 255, .14);
      border-radius: 4px;
      overflow: hidden
    }

    .a-bar>i {
      display: block;
      height: 100%;
      background: #ffd166;
      width: 0%
    }

    .a-btn {
      pointer-events: auto;
      border: 2px solid #ffd166;
      color: #ffd166;
      background: rgba(255, 209, 102, .13);
      border-radius: 10px;
      padding: 10px 14px;
      font: 700 13px ui-monospace, Menlo, monospace;
      letter-spacing: .08em;
      cursor: pointer
    }

    .a-btn:active {
      background: rgba(255, 209, 102, .3)
    }

    .m-panel {
      background: rgba(10, 12, 18, .72);
      border: 1px solid rgba(255, 209, 102, .35);
      border-radius: 10px;
      padding: 9px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      backdrop-filter: blur(2px)
    }

    .m-panel .ttl {
      font-size: 10px;
      letter-spacing: .2em;
      color: #ffd166
    }

    .m-toast {
      background: rgba(10, 12, 18, .85);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 9px;
      padding: 8px 14px;
      color: #e7e9ee;
      font-size: 12px;
      animation: tin .2s ease, tout .5s ease 3.4s forwards;
      max-width: 88vw;
      text-align: center
    }

    @keyframes tin {
      from {
        opacity: 0;
        transform: translateY(8px)
      }
    }

    @keyframes tout {
      to {
        opacity: 0
      }
    }

    .m-card {
      background: rgba(10, 12, 18, .78);
      border: 1px solid rgba(74, 222, 128, .5);
      border-radius: 12px;
      padding: 10px 14px;
      max-width: 320px
    }

    .m-card .mt {
      color: #4ade80;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .04em
    }

    .m-card .mb {
      color: #cfd3dd;
      font-size: 11.5px;
      line-height: 1.5;
      margin-top: 4px
    }

    .m-card .mr {
      color: #ffd166;
      font-size: 11px;
      margin-top: 5px
    }

    #feed {
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    #feed .a-text {
      font-size: 10.5px;
      color: #9aa1b4;
      opacity: .9
    }

    #feed .a-text b {
      color: #c8b1ff;
      font-weight: 700
    }

    #actbtn {
      position: fixed;
      right: 18px;
      bottom: 22px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      z-index: 6;
      font-size: 13px
    }

    .m-modal {
      position: fixed;
      inset: 0;
      background: rgba(8, 9, 13, .86);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9;
      pointer-events: auto
    }

    .m-modal .box {
      background: #14161d;
      border: 1px solid rgba(255, 209, 102, .5);
      border-radius: 14px;
      padding: 26px 22px;
      width: min(420px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .m-modal h1 {
      margin: 0;
      color: #ffd166;
      font-size: 30px;
      letter-spacing: .02em
    }

    .m-modal p {
      margin: 0;
      color: #aeb4c2;
      font-size: 12.5px;
      line-height: 1.6
    }

    .m-modal input {
      pointer-events: auto;
      background: #0c0e13;
      border: 1px solid #3a3f4d;
      color: #e7e9ee;
      border-radius: 8px;
      padding: 11px;
      font: 12px ui-monospace, Menlo, monospace;
      width: 100%;
      box-sizing: border-box
    }

    .m-modal .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .m-modal .a-btn {
      flex: 1;
      text-align: center;
      min-width: 130px
    }

    .ghost {
      border-color: #5a6070;
      color: #aeb4c2;
      background: rgba(255, 255, 255, .05)
    }

    .small {
      font-size: 10px;
      color: #6b7180
    }
  </style>
</head>

<body>
  <canvas></canvas>
  <div id="ui">
    <div class="slot" id="sl-tl"></div>
    <div class="slot" id="sl-tc"></div>
    <div class="slot" id="sl-tr"></div>
    <div class="slot" id="sl-bc"></div>
    <div class="slot" id="sl-bl">
      <div id="feed"></div>
    </div>
    <button id="actbtn" class="a-btn ui-int">JACK</button>
  </div>
  <div id="modal"></div>
  <script>
    'use strict';
    /* =====================================================================
       BLOCKTOWN v3 — THE AI-DIRECTED CITY
       The engine simulates an infinite deterministic city. A "Director"
       (Google Gemini via the player's own AI-Studio key) receives the world
       rules + component schema each turn and replies with a strict-JSON plan:
       one mission, world edits, optional UI panels, and its own updated
       memory — so the AI runs the world; you only drive and do missions.
       No key? A local offline director keeps the city alive.
    ===================================================================== */
    const cv = document.querySelector('canvas'), g = cv.getContext('2d');
    let W = 1, H = 1, Z = 1, U = 1;
    function fit() {
      const vp = window.visualViewport;
      W = Math.round((vp && vp.width) || innerWidth); H = Math.round((vp && vp.height) || innerHeight);
      const d = Math.min(2, devicePixelRatio || 1);
      cv.width = W * d; cv.height = H * d; cv.style.width = W + 'px'; cv.style.height = H + 'px';
      g.setTransform(d, 0, 0, d, 0, 0);
      Z = Math.max(.68, Math.min(1, Math.min(W, H) / 560));
      U = Math.max(.85, Math.min(1.25, Math.min(W, H) / 420))
    }
    onresize = fit; fit();
    const PI = Math.PI, mod = (n, m) => ((n % m) + m) % m, cl = v => Math.max(-1, Math.min(1, v)),
      na = a => { while (a > PI) a -= 2 * PI; while (a < -PI) a += 2 * PI; return a };
    /* ---------------- deterministic world ---------------- */
    const T = 260, RW = 90, BS = T - RW;
    function hsh(i, j, k) { let n = Math.sin(i * 127.1 + j * 311.7 + (k || 0) * 74.7) * 43758.5453; return n - Math.floor(n) }
    function blockType(i, j) { const h = hsh(i, j, 1); return h < .14 ? 'park' : h < .30 ? 'lot' : 'bldg' }
    function solidAt(x, y) {
      const i = Math.floor(x / T), j = Math.floor(y / T);
      if (x - i * T < RW || y - j * T < RW) return false; return blockType(i, j) === 'bldg'
    }
    function clearAt(x, y, r) {
      return !solidAt(x, y) && !solidAt(x + r, y) && !solidAt(x - r, y) && !solidAt(x, y + r) && !solidAt(x, y - r)
        && !solidAt(x + r * .7, y + r * .7) && !solidAt(x - r * .7, y + r * .7) && !solidAt(x + r * .7, y - r * .7) && !solidAt(x - r * .7, y - r * .7)
    }
    function findFree(x, y, r) {
      r = r || 12; if (clearAt(x, y, r)) return { x, y };
      for (let d = 14; d < 520; d += 14)for (let a = 0; a < 6.28; a += .45) {
        const fx = x + Math.cos(a) * d, fy = y + Math.sin(a) * d;
        if (clearAt(fx, fy, r)) return { x: fx, y: fy }
      }
      return { x: Math.round(x / T) * T + RW / 2, y: Math.round(y / T) * T + RW / 2 }
    } // road centers are always clear
    function snapRoad(x, y) { // nearest point guaranteed on a road
      return { x: Math.round(x / T) * T + RW / 2, y: Math.round(y / T) * T + RW / 2 }
    }
    const BPAL = ['#2b3242', '#343049', '#3a2f3b', '#2e3a3a', '#373430', '#303648'];
    /* ---------------- state ---------------- */
    let state = 'boot', cash = 0, best = 0, heat = 0, coolT = 0, onFoot = true, t = 0;
    let px = 0, py = 0, hearts = 3, invT = 0, kbx = 0, kby = 0, stuckT = 0, lastPX = 0, lastPY = 0;
    let car = null, peds = [], traffic = [], cops = [], gangs = [], parts = [], rings = [], wrecks = [], takenLots = {}, copSpawnT = 0, grabT = 0;
    let weather = 'clear', keysDown = {}, ptr = null;
    let events = [];              // recent world events (fed to the Director)
    function logEvent(s) { events.push(s); if (events.length > 14) events.shift() }
    /* ================= UI KIT ================= */
    const $ = id => document.getElementById(id);
    const UIK = { // ---- atoms ----
      el(tag, cls, parent) { const n = document.createElement(tag); if (cls) n.className = cls; if (parent) parent.appendChild(n); return n },
      text(s, parent) { const n = UIK.el('div', 'a-text', parent); n.textContent = s; return n },
      stat(label, bind, parent) {
        const n = UIK.el('div', 'a-stat', parent);
        const lb = UIK.el('span', 'lb', n); lb.textContent = label;
        const vl = UIK.el('span', 'vl', n); vl.textContent = '—';
        if (bind) binds.push({ n: vl, path: bind }); return n
      },
      badge(bind, parent) { const n = UIK.el('div', 'a-badge', parent); if (bind) binds.push({ n, path: bind }); return n },
      bar(label, bind, parent) {
        const wrap = UIK.el('div', '', parent);
        if (label) { const l = UIK.el('div', 'a-text', wrap); l.textContent = label; l.style.fontSize = '9px' }
        const b = UIK.el('div', 'a-bar', wrap); const i = UIK.el('i', '', b);
        if (bind) binds.push({ n: i, path: bind, bar: 1 }); return wrap
      },
      button(label, cb, parent) {
        const n = UIK.el('button', 'a-btn ui-int', parent); n.textContent = label;
        n.addEventListener('pointerdown', e => { e.stopPropagation(); cb() }); return n
      },
      // ---- molecules ----
      panel(title, slot) {
        const p = UIK.el('div', 'm-panel', $('sl-' + slot));
        if (title) { const tt = UIK.el('div', 'ttl', p); tt.textContent = title } return p
      },
      toast(s) {
        const n = UIK.el('div', 'm-toast', $('sl-bc')); n.textContent = s;
        setTimeout(() => n.remove && n.remove(), 4200); return n
      },
      card() {
        let c = $('sl-tc').querySelector && $('sl-tc').querySelector('.m-card');
        if (!c) {
          c = UIK.el('div', 'm-card', $('sl-tc'));
          UIK.el('div', 'mt', c); UIK.el('div', 'mb', c); UIK.el('div', 'mr', c)
        } return c
      },
      feed(s, who) {
        const f = $('feed'); const n = UIK.el('div', 'a-text', f);
        const b = UIK.el('b', '', n); b.textContent = (who || 'DIRECTOR') + ' ';
        n.appendChild(document.createTextNode(s));
        while (f.children.length > 3) f.children[0].remove(); return n
      }
    };
    let binds = []; // {n,path,bar?} refreshed every frame from snapshot()
    function snapshot() {
      return {
        cash: '$' + cash, hearts: '♥'.repeat(Math.max(0, hearts)) + '♡'.repeat(Math.max(0, 3 - hearts)),
        heat: '★'.repeat(heat) + '☆'.repeat(5 - heat), carHp: car ? Math.max(0, car.hp) / 100 : 0,
        carHpTxt: car ? ('CAR ' + Math.max(0, car.hp | 0) + '%') : 'ON FOOT',
        mission: {
          title: M.cur ? M.cur.title : '—', reward: M.cur ? ('$' + M.cur.reward) : '—',
          timeLeft: M.cur && M.cur.timeLimit ? Math.max(0, Math.ceil(M.cur.timeLimit - M.cur.t)) + 's' : '—',
          progress: M.cur ? M.progress() : 0, step: M.cur ? (M.cur.step + 1) + '/' + M.cur.wps.length : '—'
        }
      }
    }
    function resolve(o, path) { return path.split('.').reduce((a, k) => a == null ? a : a[k], o) }
    function refreshBinds() {
      const s = snapshot();
      for (const b of binds) {
        const v = resolve(s, b.path);
        if (b.bar) b.n.style.width = Math.round(Math.max(0, Math.min(1, +v || 0)) * 100) + '%';
        else b.n.textContent = v == null ? '—' : v
      }
    }
    let aiNodes = []; // Director-owned UI, replaced each plan
    function clearAINodes() { for (const n of aiNodes) n.remove && n.remove(); aiNodes = [] }
    /* Interpreter: Director UI spec -> components (strict whitelist, text only) */
    function renderSpec(list) {
      clearAINodes(); if (!Array.isArray(list)) return;
      for (const p of list.slice(0, 2)) {
        if (!p || p.type !== 'panel') continue;
        const slot = ['tl', 'tr', 'bl', 'bc'].includes(p.slot) ? p.slot : 'tr';
        const pn = UIK.panel(sstr(p.title, 16), slot); aiNodes.push(pn);
        for (const it of (Array.isArray(p.items) ? p.items : []).slice(0, 5)) {
          if (!it) continue;
          const bind = BINDS_OK.includes(it.bind) ? it.bind : null;
          if (it.type === 'stat') UIK.stat(sstr(it.label, 12), bind, pn);
          else if (it.type === 'bar') UIK.bar(sstr(it.label, 14), bind || 'mission.progress', pn);
          else if (it.type === 'text') UIK.text(sstr(it.text, 90), pn)
        }
      }
    }
    const BINDS_OK = ['cash', 'hearts', 'heat', 'carHpTxt', 'carHp', 'mission.title', 'mission.reward', 'mission.timeLeft', 'mission.progress', 'mission.step'];
    function sstr(v, n) { return String(v == null ? '' : v).replace(/\s+/g, ' ').slice(0, n) }
    function snum(v, a, b, d) { v = +v; return isFinite(v) ? Math.max(a, Math.min(b, v)) : d }
    /* ================= MISSION ENGINE ================= */
    const M = {
      cur: null, result: null,
      progress() {
        const m = M.cur; if (!m) return 0;
        if (m.verb === 'evade') return Math.max(0, Math.min(1, 1 - heat / (m.heat0 || 1)));
        return m.step / m.wps.length
      },
      start(m) {
        M.cur = m; m.step = 0; m.t = 0; m.aboard = false;
        if (m.verb === 'jack') {
          const s = snapRoad(m.wps[0].x, m.wps[0].y);
          traffic.push({ x: s.x, y: s.y, ang: 0, v: 0, hp: 80, mhp: 80, col: '#f472b6', parked: true, mkey: 1 })
        }
        if (m.verb === 'evade') { m.heat0 = Math.max(1, m.heatStart || 2); heat = Math.max(heat, m.heat0); coolT = 0 }
        const c = UIK.card(); c.children[0].textContent = m.title;
        c.children[1].textContent = m.briefing;
        c.children[2].textContent = 'REWARD $' + m.reward + (m.timeLimit ? ' · ' + m.timeLimit + 's limit' : '');
        UIK.toast('NEW MISSION: ' + m.title)
      },
      finish(ok, why) {
        const m = M.cur; if (!m) return; M.cur = null;
        traffic = traffic.filter(c => !c.mkey || c === car);
        if (ok) { cash += m.reward; logEvent('mission "' + m.title + '" SUCCEEDED (+$' + m.reward + ')'); UIK.toast('✔ ' + m.title + ' — +$' + m.reward) }
        else { logEvent('mission "' + m.title + '" FAILED (' + why + ')'); UIK.toast('✘ mission failed — ' + why) }
        M.result = (ok ? 'success' : 'failed: ' + why);
        const c = UIK.card(); c.children[0].textContent = ok ? 'MISSION COMPLETE' : 'MISSION FAILED';
        c.children[1].textContent = 'the Director is writing the next chapter…'; c.children[2].textContent = '';
        Director.plan(1800)
      },
      update(dt) {
        const m = M.cur; if (!m) return; m.t += dt;
        if (m.timeLimit && m.t > m.timeLimit) return M.finish(false, 'out of time');
        if (m.verb === 'evade') { if (heat === 0 && m.t > 2) M.finish(true); return }
        const wp = m.wps[m.step]; if (!wp) return M.finish(true);
        const dd = Math.hypot(wp.x - px, wp.y - py);
        if (m.verb === 'jack' && m.step === 0) {
          if (car && car.mkey) { m.step = 1; UIK.toast('marked car secured — deliver it!'); if (m.wps.length < 2) M.finish(true) }
          return
        }
        if (dd < 46) {
          if (m.verb === 'taxi') {
            if (onFoot) { UIK.toast('you need a car for the passenger'); return }
            if (m.step === 0) { m.aboard = true; UIK.toast('passenger aboard') }
            else if (!m.aboard) return
          }
          if (m.verb === 'race' && onFoot) { UIK.toast('checkpoints need wheels'); return }
          if (m.verb === 'jack' && m.step === 1 && (!car || !car.mkey)) { UIK.toast('deliver the MARKED car'); return }
          m.step++;
          if (m.step >= m.wps.length) M.finish(true);
          else UIK.toast('checkpoint ' + m.step + '/' + m.wps.length)
        }
      }
    };
    /* ================= THE DIRECTOR ================= */
    const Director = {
      key: '', mode: 'offline', memory: '', busy: false, lastCall: 0, timer: null, n: 0,
      plan(delay) {
        clearTimeout(Director.timer);
        Director.timer = setTimeout(() => Director.go(), delay || 10)
      },
      async go() {
        if (Director.busy || state !== 'play') return;
        const now = Date.now();
        if (now - Director.lastCall < 8000) { Director.plan(8000 - (now - Director.lastCall)); return }
        Director.busy = true; Director.lastCall = now;
        let plan = null;
        if (Director.mode === 'ai') {
          UIK.feed('thinking…');
          try { plan = await Director.callGemini() }
          catch (e) { UIK.feed('offline (' + sstr(e.message, 40) + ') — local plan'); plan = null }
        }
        if (!plan) plan = Director.offline();
        Director.apply(plan); Director.busy = false
      },
      offline() {
        Director.n++; const verbs = ['deliver', 'race', 'goto', 'taxi', 'jack', 'evade'];
        const v = verbs[Director.n % verbs.length];
        const wp = (d) => { const a = Math.random() * 6.28; return { dx: Math.cos(a) * d, dy: Math.sin(a) * d, label: '' } };
        const lines = {
          deliver: ['Hot Package', 'No questions. Pick it up, drop it off, get paid.'],
          race: ['Street Sprint', 'Three checkpoints. The clock is already laughing at you.'],
          goto: ['Meet the Contact', 'Someone wants a word. Corner spot, come alone.'],
          taxi: ['Fare Dodger', 'A passenger needs out of the neighborhood. Fast.'],
          jack: ['Repo Job', 'A marked pink ride needs "recovering". Bring it in.'],
          evade: ['Burn Notice', 'You are too famous. Lose the heat, earn the quiet.']
        };
        const wps = v === 'race' ? [wp(500), wp(800), wp(1100)] : v === 'goto' || v === 'evade' ? [wp(650)] : [wp(550), wp(1000)];
        return {
          banner: 'the city hums along', mission: {
            title: lines[v][0], briefing: lines[v][1], verb: v,
            waypoints: wps, reward: 80 + Director.n * 15 + (Math.random() * 60 | 0),
            timeLimit: v === 'race' ? 55 : 0, heatStart: 2
          }, world: [], ui: []
        }
      },
      async callGemini() {
        const prompt = Director.prompt();
        const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(Director.key), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { temperature: 1.0, responseMimeType: 'application/json' }
          })
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        let txt = ((((data.candidates || [])[0] || {}).content || {}).parts || []).map(p => p.text || '').join('');
        txt = txt.replace(/```json|```/g, '');
        const a = txt.indexOf('{'), b = txt.lastIndexOf('}');
        return JSON.parse(txt.slice(a, b + 1))
      },
      prompt() {
        return [
          'You are THE DIRECTOR, the AI game-master of BLOCKTOWN, a top-down infinite procedural city (endless deterministic grid: tile=260px, every tile edge is a 90px road; blocks are solid buildings, parks or parking lots). The human only drives/walks and does your missions. YOU run the world: invent one mission per turn, edit the world, build UI from the component kit, and keep a MEMORY string to write a continuing crime-city storyline with recurring named characters. Be cinematic, surprising, varied; react to the EVENTS and the last mission result; escalate arcs across turns.',
          'COORDINATES: give positions as {dx,dy} pixel offsets from the player, each within ±1400. The engine snaps them onto roads.',

          traffic.push({ x: lc.x, y: lc.y, ang: lc.vert ? PI / 2 : 0, v: 0, hp: 60, mhp: 60, col: lc.col, parked: true, key: lc.key });
          takenLots[lc.key] = false
        }
      }
      for (const c of traffic) if (c.key && !c.parked) takenLots[c.key] = true;
      // cops
      const wantCops = heat > 0 ? Math.min(6, heat + (heat >= 4 ? 1 : 0)) : 0;
      copSpawnT -= dt;
      if (cops.length < wantCops && copSpawnT <= 0) {
        copSpawnT = .9;
        const p = ring_(520, 700), f = findFree(p.x, p.y, 16);
        cops.push({ x: f.x, y: f.y, v: 0, ang: 0, hp: 70, ramCd: 0 })
      }
      if (cops.length > wantCops) cops.length = wantCops;
      let copNear = false, grabbing = false;
      for (const c of cops) {
        c.ramCd = Math.max(0, c.ramCd - dt);
        const dd = chase(c, dt, (280 + heat * 16) * wf);
        if (dd < 380) copNear = true;
        if (onFoot && dd < 30) return gameOver('BUSTED');
        if (!onFoot && dd < 40 && c.ramCd <= 0) {
          c.ramCd = .7; car.hp -= 7 + heat * 2.2; car.v *= .82;
          boom((c.x + px) / 2, (c.y + py) / 2, 6);
          const nn = { x: (c.x - px) / dd, y: (c.y - py) / dd }; c.x += nn.x * 26; c.y += nn.y * 26; c.v *= .5
        }
        if (!onFoot && dd < 58 && Math.abs(car.v) < 28) grabbing = true;
        if (!onFoot && dd < 34 && Math.abs(car.v) > 150) c.hp -= (Math.abs(car.v) - 130) / 5
      }
      if (grabbing) {
        grabT += dt * (heat >= 3 ? 1.25 : 1);
        if (grabT >= 1.6) return gameOver('BUSTED')
      }
      else grabT = Math.max(0, grabT - dt * 1.6);
      for (const c of cops) if (c.hp <= 0) { explode(c.x, c.y, c.ang); c.dead = true; bump(1); logEvent('player destroyed a police car') }
      cops = cops.filter(c => !c.dead);
      // gang cars (Director's hounds)
      for (const c of gangs) {
        c.ramCd = Math.max(0, c.ramCd - dt);
        const dd = chase(c, dt, 265 * wf);
        if (!onFoot && dd < 40 && c.ramCd <= 0) {
          c.ramCd = .8; car.hp -= 10; car.v *= .8; boom((c.x + px) / 2, (c.y + py) / 2, 6);
          const nn = { x: (c.x - px) / dd, y: (c.y - py) / dd }; c.x += nn.x * 26; c.y += nn.y * 26; c.v *= .5
        }
        if (onFoot && dd < 22) { if (c.v > 90) hurtHeart((px - c.x) / dd, (py - c.y) / dd, 'gang hit-and-run'); }
        if (!onFoot && dd < 34 && Math.abs(car.v) > 150) c.hp -= (Math.abs(car.v) - 130) / 5;
        if (dd > 1600) c.dead = true
      }
      for (const c of gangs) if (c.hp <= 0 && !c.dead) {
        explode(c.x, c.y, c.ang); c.dead = true; cash += 40;
        logEvent('player destroyed a gang car (+$40 bounty)'); UIK.toast('gang car down — +$40 bounty')
      }
      gangs = gangs.filter(c => !c.dead);
      // traffic explosions
      for (const c of traffic) if (c.hp <= 0) {
        explode(c.x, c.y, c.ang); c.gone = true;
        if (c.mkey && M.cur && M.cur.verb === 'jack') M.finish(false, 'the marked car was destroyed')
      }
      traffic = traffic.filter(c => !c.gone && (c.parked ? Math.hypot(c.x - px, c.y - py) < 1300 : Math.hypot(c.x - px, c.y - py) < 980));
      // heat cooldown
      if (heat > 0 && !copNear) { coolT += dt; if (coolT > 7) { heat--; coolT = 0; if (heat === 0) { UIK.toast('heat lost — clean'); cops.length = 0 } } }
      else if (copNear) coolT = 0;
      // fx
      for (const p of parts) { p.x += p.vx * dt; p.y += p.vy * dt; p.a -= dt * 1.8 }
      parts = parts.filter(p => p.a > 0);
      for (const r of rings) { r.r += 260 * dt; r.a -= dt * 1.8 }
      rings = rings.filter(r => r.a > 0);
      for (const wk of wrecks) {
        wk.life -= dt;
        if (wk.life > 7 && Math.random() < dt * 10) parts.push({ x: wk.x, y: wk.y - 4, vx: (Math.random() - .5) * 20, vy: -40, a: .8, c: '#6b7280' })
      }
      wrecks = wrecks.filter(w => w.life > 0);
    }
    /* ================= DRAW ================= */
    function draw() {
      g.fillStyle = '#15171c'; g.fillRect(0, 0, W, H);
      g.save(); g.scale(Z, Z);
      const Wv = W / Z, Hv = H / Z, camx = px - Wv / 2, camy = py - Hv / 2;
      const i0 = Math.floor(camx / T) - 1, i1 = Math.floor((camx + Wv) / T) + 1, j0 = Math.floor(camy / T) - 1, j1 = Math.floor((camy + Hv) / T) + 1;
      g.fillStyle = '#22252c';
      for (let i = i0; i <= i1; i++)g.fillRect(i * T - camx, 0, RW, Hv);
      for (let j = j0; j <= j1; j++)g.fillRect(0, j * T - camy, Wv, RW);
      g.strokeStyle = 'rgba(255,220,120,.28)'; g.lineWidth = 2; g.setLineDash([14, 18]);
      for (let i = i0; i <= i1; i++) { g.beginPath(); g.moveTo(i * T + RW / 2 - camx, 0); g.lineTo(i * T + RW / 2 - camx, Hv); g.stroke() }
      for (let j = j0; j <= j1; j++) { g.beginPath(); g.moveTo(0, j * T + RW / 2 - camy); g.lineTo(Wv, j * T + RW / 2 - camy); g.stroke() }
      g.setLineDash([]);
      for (let i = i0; i <= i1; i++)for (let j = j0; j <= j1; j++) {
        const x = i * T + RW - camx, y = j * T + RW - camy, tp = blockType(i, j);
        if (tp === 'bldg') {
          g.fillStyle = BPAL[(hsh(i, j, 5) * 6) | 0]; g.fillRect(x, y, BS, BS);
          g.fillStyle = 'rgba(255,240,170,' + (0.05 + hsh(i, j, 6) * .09) + ')';
          const wn = 3 + (hsh(i, j, 7) * 3 | 0);
          for (let a = 0; a < wn; a++)for (let b = 0; b < wn; b++)
            if (hsh(i * 9 + a, j * 9 + b, 8) < .4) g.fillRect(x + 14 + a * (BS - 28) / wn, y + 14 + b * (BS - 28) / wn, 8, 10);
          g.strokeStyle = 'rgba(0,0,0,.4)'; g.strokeRect(x, y, BS, BS)
        }
        else if (tp === 'park') {
          g.fillStyle = '#233327'; g.fillRect(x, y, BS, BS);
          g.fillStyle = '#2f4a33';
          for (let k = 0; k < 5; k++) {
            const tx = x + 20 + hsh(i, j, 10 + k) * (BS - 40), ty = y + 20 + hsh(i, j, 20 + k) * (BS - 40);
            g.beginPath(); g.arc(tx, ty, 10 + hsh(i, j, 30 + k) * 8, 0, 7); g.fill()
          }
        }
        else {
          g.fillStyle = '#1d2026'; g.fillRect(x, y, BS, BS);
          g.strokeStyle = 'rgba(255,255,255,.1)';
          for (let k = 1; k < 4; k++) { g.beginPath(); g.moveTo(x + k * BS / 4, y + 20); g.lineTo(x + k * BS / 4, y + BS - 20); g.stroke() }
        }
      }
      for (const wk of wrecks) {
        g.save(); g.translate(wk.x - camx, wk.y - camy); g.rotate(wk.ang);
        g.fillStyle = '#1c1f24'; g.fillRect(-20, -11, 40, 22);
        g.fillStyle = 'rgba(251,146,60,' + Math.max(0, (wk.life - 7) / 2) * .8 + ')'; g.fillRect(-8, -5, 16, 10);
        g.strokeStyle = '#000'; g.strokeRect(-20, -11, 40, 22); g.restore()
      }
      // mission waypoints
      if (M.cur) M.cur.wps.forEach((wp, i) => {
        const gx = wp.x - camx, gy = wp.y - camy, curW = i === M.cur.step;
        if (i < M.cur.step) return;
        g.globalAlpha = curW ? 1 : .35;
        g.fillStyle = curW ? '#4ade80' : '#9ca3af';
        g.save(); g.translate(gx, gy); g.rotate(t * 2); g.fillRect(-10, -10, 20, 20); g.restore();
        g.font = '11px ui-monospace'; g.textAlign = 'center';
        g.fillText(wp.label || (M.cur.verb === 'deliver' && i === 0 ? 'PICKUP' : M.cur.verb === 'jack' && i === 0 ? 'MARKED CAR' : 'GO'), gx, gy - 18);
        g.globalAlpha = 1
      });
      for (const c of traffic) {
        drawCar(c.x - camx, c.y - camy, c.ang, c.col, false, c);
        if (c.mkey) {
          g.fillStyle = '#f472b6'; g.save(); g.translate(c.x - camx, c.y - camy - 24); g.rotate(t * 3);
          g.fillRect(-5, -5, 10, 10); g.restore()
        }
      }
      for (const p of peds) {
        g.fillStyle = p.col; g.beginPath(); g.arc(p.x - camx, p.y - camy, 6, 0, 7); g.fill();
        g.fillStyle = 'rgba(0,0,0,.5)'; g.beginPath(); g.arc(p.x - camx, p.y - camy, 2.5, 0, 7); g.fill()
      }
      for (const c of gangs) drawCar(c.x - camx, c.y - camy, c.ang, '#b91c1c', false, c);
      for (const c of cops) drawCar(c.x - camx, c.y - camy, c.ang, '#e8e8ee', true, c);
      if (!(invT > 0 && Math.sin(t * 24) > 0)) {
        if (onFoot) {
          g.fillStyle = '#ffd166'; g.beginPath(); g.arc(Wv / 2, Hv / 2, 9, 0, 7); g.fill();
          g.fillStyle = '#101216'; g.beginPath(); g.arc(Wv / 2, Hv / 2, 3.5, 0, 7); g.fill()
        }
        else if (car) drawCar(Wv / 2, Hv / 2, car.ang, car.mkey ? '#f472b6' : '#ffd166', false)
      }
      if (grabT > 0 && !onFoot) {
        g.strokeStyle = '#f87171'; g.lineWidth = 4;
        g.beginPath(); g.arc(Wv / 2, Hv / 2, 26, -PI / 2, -PI / 2 + 6.28 * Math.min(1, grabT / 1.6)); g.stroke();
        g.fillStyle = '#f87171'; g.font = 'bold 11px ui-monospace'; g.textAlign = 'center';
        g.fillText('DRIVE!', Wv / 2, Hv / 2 - 34)
      }
      for (const p of parts) { g.globalAlpha = Math.max(0, p.a); g.fillStyle = p.c; g.fillRect(p.x - camx - 3, p.y - camy - 3, 6, 6) }
      g.globalAlpha = 1;
      for (const r of rings) {
        g.globalAlpha = Math.max(0, r.a); g.strokeStyle = '#fbbf24'; g.lineWidth = 3;
        g.beginPath(); g.arc(r.x - camx, r.y - camy, r.r, 0, 7); g.stroke()
      }
      g.globalAlpha = 1;
      g.restore();
      if (weather === 'rain') {
        g.strokeStyle = 'rgba(150,190,255,.35)'; g.lineWidth = 1;
        for (let i = 0; i < 50; i++) {
          const x = (i * 97 + t * 640) % (W + 40) - 20, y = (i * 61 + t * 900) % (H + 40) - 20;
          g.beginPath(); g.moveTo(x, y); g.lineTo(x - 4, y + 14); g.stroke()
        }
      }
      // mission arrow (screen space)
      if (M.cur && M.cur.wps[M.cur.step]) {
        const wp = M.cur.wps[M.cur.step];
        const sx = (wp.x - px) * Z + W / 2, sy = (wp.y - py) * Z + H / 2;
        if (sx < 0 || sx > W || sy < 0 || sy > H) {
          const an = Math.atan2(wp.y - py, wp.x - px);
          const ax = W / 2 + Math.cos(an) * (Math.min(W, H) / 2 - 52), ay = H / 2 + Math.sin(an) * (Math.min(W, H) / 2 - 52);
          g.save(); g.translate(ax, ay); g.rotate(an); g.fillStyle = '#4ade80';
          g.beginPath(); g.moveTo(14, 0); g.lineTo(-8, 8); g.lineTo(-8, -8); g.closePath(); g.fill(); g.restore();
          g.fillStyle = '#4ade80'; g.font = '11px ui-monospace'; g.textAlign = 'center';
          g.fillText(Math.round(Math.hypot(wp.x - px, wp.y - py) / 10) + 'm', ax, ay + 22)
        }
      }
    }
    function drawCar(x, y, ang, col, cop, ent) {
      g.save(); g.translate(x, y); g.rotate(ang);
      g.fillStyle = col; g.fillRect(-20, -11, 40, 22);
      g.fillStyle = 'rgba(0,0,0,.35)'; g.fillRect(2, -8, 10, 16);
      if (cop) { g.fillStyle = Math.sin(t * 14) > 0 ? '#ef4444' : '#3b82f6'; g.fillRect(-6, -9, 8, 18) }
      if (ent && ent.mhp && ent.hp < ent.mhp * .5) { g.fillStyle = 'rgba(60,60,60,.55)'; g.fillRect(-14, -7, 12, 14) }
      g.strokeStyle = 'rgba(0,0,0,.5)'; g.strokeRect(-20, -11, 40, 22);
      g.restore()
    }
    /* ================= BOOT ================= */
    bootMenu();
    /* debug/testing hook (invisible to players) */
    window.__bt = {
      get s() {
        return {
          px, py, hearts, heat, onFoot, state, cops, gangs, traffic, W, H, Z, weather,
          mission: M.cur, memory: Director.memory, mode: Director.mode
        }
      },
      set(o) {
        for (const k of ['px', 'py', 'onFoot', 'heat', 'hearts', 'state']) if (o[k] !== undefined) eval(k + '=o[k]');
        if (o.car !== undefined) car = o.car; if (o.key !== undefined) Director.key = o.key; if (o.mode !== undefined) Director.mode = o.mode
      },
      clearAt, solidAt, findFree, mod, reset, startGame, action,
      applyPlan: p => Director.apply(p), offline: () => Director.offline(), goDirector: () => Director.go(), M, snapshot
    };
  </script>
