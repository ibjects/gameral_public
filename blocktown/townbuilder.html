<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocktown Town Builder</title>
    <style>
        :root {
            --bg-dark: #101216;
            --panel-bg: #14161d;
            --text-main: #e7e9ee;
            --accent: #ffd166;
            --road-color: #22252c;
            --road-lines: rgba(255, 220, 120, 0.28);
            --tile-size: 260px;
            --inner-size: 170px;
            --offset: 45px;
            /* (260 - 170) / 2 */
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: ui-monospace, Menlo, monospace;
            overflow: hidden;
        }

        /* Split Screen Layout */
        .layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- LEFT PANEL: CONTROLS --- */
        .controls-side {
            flex: 1;
            background: linear-gradient(90deg, #101216 0%, #1a1d26 100%);
            border-right: 2px solid var(--accent);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
            max-width: 450px;
        }

        .controls-side h1 {
            color: var(--accent);
            margin-top: 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 209, 102, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 15px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn.active,
        .btn:active {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .custom-code-area {
            display: none;
            flex-direction: column;
            flex-grow: 1;
        }

        .custom-code-area label {
            margin-bottom: 8px;
            color: #f87171;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .snippet-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .snippet-controls select {
            flex-grow: 1;
            background: #0a0c10;
            color: var(--accent);
            border: 1px solid #3a3f4d;
            padding: 6px;
            border-radius: 4px;
            font-family: inherit;
        }

        .snippet-controls button {
            background: #0a0c10;
            color: #4ade80;
            border: 1px solid #4ade80;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            padding: 0 10px;
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            background: #0a0c10;
            border: 1px solid #3a3f4d;
            color: #4ade80;
            padding: 10px;
            font-family: inherit;
            border-radius: 6px;
            resize: none;
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #8b8fa3;
            line-height: 1.5;
        }

        /* --- RIGHT PANEL: MAP --- */
        .map-side {
            flex: 1.5;
            position: relative;
            background-color: #0c0e12;
            overflow: hidden;
            cursor: crosshair;
        }

        .map-side.pan-mode {
            cursor: grab;
        }

        .map-side.pan-mode:active {
            cursor: grabbing;
        }

        /* The Infinite Grid Container */
        #map-container {
            position: absolute;
            transform-origin: 0 0;
            background-size: var(--tile-size) var(--tile-size);
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        /* --- CITY BLOCKS --- */
        .city-block {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            background-color: var(--road-color);
            border: 2px dashed var(--road-lines);
            box-sizing: border-box;
        }

        /* Hover Preview Ghosting */
        .hover-preview {
            background-color: rgba(255, 209, 102, 0.1);
            border: 2px solid var(--accent);
            pointer-events: none;
            z-index: 100;
            transition: left 0.05s linear, top 0.05s linear;
            display: none;
        }

        /* Inner Playable Area (Strictly 170x170) */
        .inner-block {
            position: absolute;
            width: var(--inner-size);
            height: var(--inner-size);
            left: var(--offset);
            top: var(--offset);
            box-sizing: border-box;
            box-shadow: 8px 10px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        .city-block:hover .inner-block {
            transform: scale(1.05);
            z-index: 5;
        }

        /* Block Types */
        .bldg-roof {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 0, 0, 0.4);
        }

        .park-grass {
            width: 100%;
            height: 100%;
            background: #233327;
            position: relative;
            overflow: hidden;
        }

        .park-tree {
            position: absolute;
            background: #2f4a33;
            border-radius: 50%;
            box-shadow: 3px 4px 0 rgba(0, 0, 0, 0.3);
        }

        .parking-lot {
            width: 100%;
            height: 100%;
            background: #2a2d35;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(255, 255, 255, 0.2) 20px, rgba(255, 255, 255, 0.2) 22px);
            border: 2px solid #1a1c23;
        }

        /* STRICT 170x170 Custom Wrapper */
        .custom-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: block;
            position: relative;
        }

        /* UI Overlays on Map */
        .map-ui {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }
    </style>
</head>

<body>

    <div class="layout">
        <div class="controls-side">
            <h1>Town Builder <span style="font-size: 0.4em;">v0.1</span></h1>
            <div class="toolbar" id="toolbar"></div>

            <div class="custom-code-area" id="custom-area">
                <label>
                    <span>HTML/CSS INJECTOR (170x170)</span>
                </label>

                <div class="snippet-controls">
                    <select id="snippet-select">
                        <option value="default">Default Ad Space</option>
                    </select>
                    <button id="save-snippet-btn" title="Save Current HTML">💾 Save</button>
                    <button id="del-snippet-btn" style="color: #f87171; border-color: #f87171;"
                        title="Delete Snippet">X</button>
                </div>

                <textarea id="custom-code" spellcheck="false">
<div style="background: #f472b6; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center;">
  <b style="color:#000;">AD SPACE<br>OR CSS</b>
</div>
                </textarea>
                <div class="instructions">
                    * Click map to place block.<br>
                    * Drag to Pan. Scroll to Smooth Zoom.<br>
                    * Wrapper is strictly locked to 170x170 with hidden overflow.
                </div>
            </div>
        </div>

        <div class="map-side" id="map-viewport">
            <div id="map-container" style="width: 10000px; height: 10000px;">
                <div id="hover-preview" class="city-block hover-preview"></div>
            </div>

            <div class="map-ui">
                <button class="btn" id="center-map" title="Center on starting block">🎯 Center</button>
                <button class="btn" id="zoom-out">➖</button>
                <button class="btn" id="zoom-in">➕</button>
            </div>
        </div>
    </div>

    <script src="blocks/block-snippets.js"></script>
    <script>
        const mapContainer = document.getElementById('map-container');
        const viewport = document.getElementById('map-viewport');
        const toolbar = document.getElementById('toolbar');
        const customArea = document.getElementById('custom-area');
        const customCodeInput = document.getElementById('custom-code');
        const snippetSelect = document.getElementById('snippet-select');
        const hoverPreview = document.getElementById('hover-preview');

        const tileSize = 260;
        const blockSnippets = window.BLOCK_SNIPPETS || {};
        const LOCAL_PREFIX = 'local:';
        const STORE_KEY = 'bt_citybuilder_snippets';

        // --- STATE ---
        let currentTool = Object.keys(blockSnippets)[0] || 'custom';
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let actualDragOccurred = false; // Tracks if the mouse actually moved during a click
        let startX, startY;
        const blocks = {};
        const mapCenterGrid = Math.floor(10000 / 2 / tileSize);

        // --- BLOCK SNIPPETS ---
        let savedSnippets = JSON.parse(localStorage.getItem(STORE_KEY)) || {};

        function getSavedSnippetName(key) {
            return key.slice(LOCAL_PREFIX.length);
        }

        function getSnippet(key) {
            if (key.startsWith(LOCAL_PREFIX)) {
                const name = getSavedSnippetName(key);
                return { name, icon: '◆', html: savedSnippets[name], editable: true, local: true };
            }
            return blockSnippets[key];
        }

        function getSnippetEntries() {
            const builtIns = Object.entries(blockSnippets);
            const saved = Object.keys(savedSnippets).map(name => [
                LOCAL_PREFIX + name,
                { name, icon: '◆', html: savedSnippets[name], editable: true, local: true }
            ]);
            return builtIns.concat(saved);
        }

        function snippetLabel(snippet) {
            return `${snippet.icon ? snippet.icon + ' ' : ''}${snippet.name || 'Untitled'}`;
        }

        function renderToolbar() {
            toolbar.innerHTML = '';

            // Inject dedicated Pan Tool
            const panBtn = document.createElement('button');
            panBtn.className = 'btn';
            panBtn.dataset.tool = 'pan';
            panBtn.textContent = '🖐️ Pan / View';
            panBtn.style.borderColor = '#60a5fa';
            panBtn.style.color = '#60a5fa';
            toolbar.appendChild(panBtn);

            getSnippetEntries().forEach(([key, snippet]) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.tool = key;
                btn.textContent = snippetLabel(snippet);
                toolbar.appendChild(btn);
            });

            const eraser = document.createElement('button');
            eraser.className = 'btn';
            eraser.dataset.tool = 'eraser';
            eraser.textContent = '🗑️ Eraser';
            eraser.style.borderColor = '#f87171';
            eraser.style.color = '#f87171';
            toolbar.appendChild(eraser);
        }

        function renderSnippets() {
            snippetSelect.innerHTML = '';
            getSnippetEntries().forEach(([key, snippet]) => {
                if (typeof snippet.html !== 'string' && !snippet.editable) return;
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = snippet.name || key;
                snippetSelect.appendChild(opt);
            });
        }

        function selectTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.toolbar .btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === tool);
            });

            const snippet = getSnippet(tool);
            const canEditHtml = !!snippet && (typeof snippet.html === 'string' || snippet.editable);
            customArea.style.display = canEditHtml ? 'flex' : 'none';

            if (canEditHtml) {
                if (typeof snippet.html === 'string') customCodeInput.value = snippet.html;
                snippetSelect.value = tool;
            }

            // Adjust viewport cursors
            if (tool === 'pan') {
                viewport.classList.add('pan-mode');
                hoverPreview.style.display = 'none';
            } else {
                viewport.classList.remove('pan-mode');
            }
        }

        snippetSelect.addEventListener('change', (e) => {
            selectTool(e.target.value);
        });

        document.getElementById('save-snippet-btn').addEventListener('click', () => {
            let name = prompt("Enter a name to save this snippet:");
            if (!name) return;
            savedSnippets[name] = customCodeInput.value;
            localStorage.setItem(STORE_KEY, JSON.stringify(savedSnippets));
            renderToolbar();
            renderSnippets();
            selectTool(LOCAL_PREFIX + name);
        });

        document.getElementById('del-snippet-btn').addEventListener('click', () => {
            let current = snippetSelect.value;
            if (!current.startsWith(LOCAL_PREFIX)) return alert("Edit block-snippets.js to remove built-in snippets.");
            const name = getSavedSnippetName(current);
            if (confirm(`Delete snippet '${name}' and remove all of its blocks from the map?`)) {

                // Sweep and purge orphaned blocks
                Object.keys(blocks).forEach(key => {
                    if (blocks[key].dataset.type === current) {
                        blocks[key].remove();
                        delete blocks[key];
                    }
                });

                delete savedSnippets[name];
                localStorage.setItem(STORE_KEY, JSON.stringify(savedSnippets));

                renderToolbar();
                renderSnippets();
                selectTool(Object.keys(blockSnippets)[0] || snippetSelect.value);
            }
        });

        renderToolbar();
        renderSnippets();
        selectTool(currentTool);


        // --- TOOLBAR LOGIC ---
        toolbar.addEventListener('click', (e) => {
            const btn = e.target.closest('.btn');
            if (!btn) return;
            selectTool(btn.dataset.tool);
        });

        // --- PAN & POINTER-CENTRIC ZOOM LOGIC ---
        function updateTransform() {
            mapContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        function centerMap() {
            const keys = Object.keys(blocks);
            let targetGridX = mapCenterGrid;
            let targetGridY = mapCenterGrid;

            if (keys.length > 0) {
                const firstBlock = keys[0].split(',');
                targetGridX = parseInt(firstBlock[0]);
                targetGridY = parseInt(firstBlock[1]);
            }

            const targetPx = targetGridX * tileSize + (tileSize / 2);
            const targetPy = targetGridY * tileSize + (tileSize / 2);

            const vW = viewport.clientWidth;
            const vH = viewport.clientHeight;

            panX = (vW / 2) - (targetPx * scale);
            panY = (vH / 2) - (targetPy * scale);
            updateTransform();
        }

        viewport.addEventListener('mousedown', e => {
            if (e.target.closest('.map-ui')) return;
            isDragging = true;
            actualDragOccurred = false;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            hoverPreview.style.display = 'none';
        });

        window.addEventListener('mousemove', e => {
            // Drag Logic
            if (isDragging) {
                // Determine if we actually moved enough to call it a "drag" rather than a twitchy click
                if (Math.abs(e.clientX - startX - panX) > 3 || Math.abs(e.clientY - startY - panY) > 3) {
                    actualDragOccurred = true;
                }
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                updateTransform();
                return;
            }

            // Hover Preview Logic (Only show if not panning/dragging)
            if (currentTool !== 'pan' && currentTool !== 'eraser') {
                const rect = viewport.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left - panX) / scale;
                const mouseY = (e.clientY - rect.top - panY) / scale;

                const gridX = Math.floor(mouseX / tileSize);
                const gridY = Math.floor(mouseY / tileSize);

                hoverPreview.style.display = 'block';
                hoverPreview.style.left = `${gridX * tileSize}px`;
                hoverPreview.style.top = `${gridY * tileSize}px`;
            } else {
                hoverPreview.style.display = 'none';
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Pointer-centric smooth scroll zoom
        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomIntensity = 0.002;
            const wheel = e.deltaY < 0 ? 1 : -1;
            const zoomFactor = Math.exp(wheel * zoomIntensity * Math.abs(e.deltaY));

            const newScale = Math.max(0.15, Math.min(scale * zoomFactor, 3));

            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            scale = newScale;

            updateTransform();
        }, { passive: false });

        document.getElementById('zoom-in').onclick = () => { scale = Math.min(scale * 1.3, 3); updateTransform(); };
        document.getElementById('zoom-out').onclick = () => { scale = Math.max(scale * 0.7, 0.15); updateTransform(); };
        document.getElementById('center-map').onclick = centerMap;

        // --- BUILDING LOGIC ---
        viewport.addEventListener('click', e => {
            if (e.target.closest('.map-ui')) return;
            if (currentTool === 'pan') return; // Safe pan mode
            if (actualDragOccurred) return; // Prevent placement if the user was dragging the map

            const rect = viewport.getBoundingClientRect();
            const clickX = (e.clientX - rect.left - panX) / scale;
            const clickY = (e.clientY - rect.top - panY) / scale;

            const gridX = Math.floor(clickX / tileSize);
            const gridY = Math.floor(clickY / tileSize);
            const key = `${gridX},${gridY}`;

            if (currentTool === 'eraser') {
                if (blocks[key]) {
                    blocks[key].remove();
                    delete blocks[key];
                }
                return;
            }

            // Replace existing block
            if (blocks[key]) blocks[key].remove();
            createBlock(gridX, gridY, currentTool);
        });

        function createBlock(x, y, type) {
            const snippet = getSnippet(type);
            if (!snippet) return;

            const block = document.createElement('div');
            block.className = 'city-block';
            block.style.left = `${x * tileSize}px`;
            block.style.top = `${y * tileSize}px`;
            block.dataset.type = type; // Tag it so we can delete it later if the snippet is trashed

            const inner = document.createElement('div');
            inner.className = 'inner-block';

            if (typeof snippet.create === 'function') {
                inner.appendChild(snippet.create({ tileSize, innerSize: 170 }));
            }
            else if (typeof snippet.html === 'string' || snippet.editable) {
                const wrapper = document.createElement('div');
                wrapper.className = 'custom-wrapper';
                wrapper.innerHTML = customCodeInput.value;
                inner.appendChild(wrapper);
            }

            block.appendChild(inner);
            mapContainer.appendChild(block);
            blocks[`${x},${y}`] = block;
        }

        // --- INITIALIZATION ---
        createBlock(mapCenterGrid, mapCenterGrid, currentTool);
        centerMap();

    </script>
</body>

</html>
