                S.onceTotal = 0; S.onceDone = 0; S.hadHeat = false
            },
            progress() { return S.onceTotal ? S.onceDone / S.onceTotal : 0 },
            mkBeh(bh) {
                bh = bh || {};
                const kind = ['wander', 'follow_player', 'flee_player', 'chase_player', 'goto', 'guard'].includes(bh.kind) ? bh.kind : 'wander';
                const b = { kind };
                if (kind === 'goto') { const s2 = snapRoad(px + snum(bh.dx, -1800, 1800, 300), py + snum(bh.dy, -1800, 1800, 300)); b.x = s2.x; b.y = s2.y }
                return b
            },
            spawnEnt(e) {
                if (!e || typeof e !== 'object') return;
                const ox = snum(e.dx, -1600, 1600, 300), oy = snum(e.dy, -1600, 1600, 200);
                if (e.type === 'zone' && S.zones.length < 8) {
                    const s2 = snapRoad(px + ox, py + oy);
                    S.zones.push({
                        id: sstr(e.id, 14) || ('z' + S.zones.length), x: s2.x, y: s2.y,
                        r: snum(e.r, 40, 220, 90), label: sstr(e.label, 12),
                        visible: e.visible !== false, color: LPAL[e.color] ? e.color : 'green'
                    })
                }
                else if (e.type === 'npc' && S.npcs.length < 8) {
                    const f = findFree(px + ox, py + oy, 10);
                    S.npcs.push({
                        id: sstr(e.id, 14) || ('n' + S.npcs.length), name: sstr(e.name, 12) || 'STRANGER',
                        x: f.x, y: f.y, a: Math.random() * 7,
                        color: LPAL[e.color] ? e.color : 'white',
                        role: ['friendly', 'hostile', 'neutral'].includes(e.role) ? e.role : 'neutral',
                        hp: snum(e.hp, 1, 14, 3), speed: snum(e.speed, 30, 160, 80),
                        beh: S.mkBeh(e.behavior), atkCd: 0, reached: false
                    })
                }
                else if (e.type === 'vehicle') {
                    const s2 = snapRoad(px + ox, py + oy), f = findFree(s2.x, s2.y, 16);
                    const col = LPAL[e.color] || '#f472b6', svid = sstr(e.id, 14) || ('v' + (Math.random() * 999 | 0));
                    if (e.hostile && gangs.length < 4) gangs.push({ x: f.x, y: f.y, v: 0, ang: 0, hp: 70, ramCd: 0, hunt: 1, svid });
                    else traffic.push({ x: f.x, y: f.y, ang: 0, v: 0, hp: 90, mhp: 90, col, parked: true, mkey: e.marked ? 1 : 0, svid })
                }
                else if (e.type === 'pickup' && pickups.length < 12) {
                    const f = findFree(px + ox, py + oy, 10);
                    const kind = ['heart', 'ammo', 'cash', 'item'].includes(e.kind) ? e.kind : 'cash';
                    pickups.push({ x: f.x, y: f.y, kind, pid: sstr(e.id, 14), label: sstr(e.label, 10) })
                }
                else if (e.type === 'landmark') addLandmark(e);
                else if (e.type === 'property') addProperty(e);
            },
            load(scene) {
                if (!scene || typeof scene !== 'object') return;
                for (const e of (Array.isArray(scene.spawn) ? scene.spawn : []).slice(0, 16)) S.spawnEnt(e);
                for (const r of (Array.isArray(scene.rules) ? scene.rules : []).slice(0, 14)) {
                    if (!r || typeof r.when !== 'string') continue;
                    const parts = String(r.when).slice(0, 44).split(':');
                    const rule = {
                        when: parts[0], id: parts[1] || '', arg: +(parts[2] ?? parts[1]) || 0,
                        once: r.once !== false, fired: false, cd: 0,
                        do: (Array.isArray(r.do) ? r.do : []).slice(0, 6)
                    };
                    S.rules.push(rule); if (rule.once) S.onceTotal++
                }
                if (scene.objective) S.setObjective(sstr(scene.objective, 60), scene.nav);
                S.fire('start')
            },
            setObjective(txt, nav) {
                if (txt) { const c = UIK.card(); c.children[1].textContent = txt }
                S.nav = null; S.navRef = null;
                if (typeof nav === 'string') S.navRef = sstr(nav, 26);
                else if (nav && typeof nav === 'object') { const s2 = snapRoad(px + snum(nav.dx, -1800, 1800, 0), py + snum(nav.dy, -1800, 1800, 0)); S.nav = s2 }
            },
            resolveNav() {
                if (S.navRef) {
                    const ix = S.navRef.indexOf(':'), k = S.navRef.slice(0, ix), id = S.navRef.slice(ix + 1);
                    if (k === 'zone') { const z = S.zones.find(z => z.id === id); if (z) return z }
                    if (k === 'npc') { const n = S.npcs.find(n => n.id === id); if (n) return n }
                    if (k === 'vehicle') {
                        if (car && car.svid === id) return null;
                        const v = traffic.find(c => c.svid === id) || gangs.find(c => c.svid === id); if (v) return v
                    }
                    if (k === 'prop') { const p = props.find(p => p.id === id); if (p) return blockCenter(p.bi, p.bj) }
                    return null
                }
                return S.nav
            },
            fire(evt) {
                for (const r of S.rules) {
                    const key = r.when + (r.id ? ':' + r.id : '');
                    if (key !== evt) continue;
                    if (r.once && r.fired) continue;
                    if (!r.once && t < r.cd) continue;
                    if (!r.fired && r.once) S.onceDone++;
                    r.fired = true; r.cd = t + 3;
                    S.runActs(r.do);
                    if (state !== 'play') return
                }
            },
            runActs(list) {
                for (const a of list) {
                    if (!a || typeof a !== 'object') continue;
                    const act = a.act;
                    if (act === 'say') {
                        const n = S.npcs.find(n => n.id === a.id) || S.npcs[0];
                        const txt = sstr(a.text, 80);
                        if (n) {
                            S.bubbles = S.bubbles.filter(b => b.nid !== n.id);
                            S.bubbles.push({ nid: n.id, text: txt, t: t + 4.2 });
                            UIK.feed(txt, (n.name || 'NPC').toUpperCase())
                        } else UIK.feed(txt, 'VOICE')
                    }
                    else if (act === 'phone') {
                        Msg.show('📱 ' + (sstr(a.from, 12) || 'UNKNOWN') + ': ' + sstr(a.text, 110), 'ph' + (Math.random() * 99 | 0), 0);
                        UIK.feed(sstr(a.text, 110), sstr(a.from, 12) || 'CALLER')
                    }
                    else if (act === 'objective') S.setObjective(sstr(a.text, 60), a.nav);
                    else if (act === 'spawn') S.spawnEnt(a);
                    else if (act === 'despawn') {
                        S.zones = S.zones.filter(z => z.id !== a.id);
                        const n = S.npcs.find(n => n.id === a.id); if (n) n.gone = 2;
                        traffic = traffic.filter(c => c.svid !== a.id); gangs = gangs.filter(c => c.svid !== a.id)
                    }
                    else if (act === 'behavior') {
                        const n = S.npcs.find(n => n.id === a.id);
                        if (n) {
                            n.beh = S.mkBeh(a); n.reached = false;
                            if (['friendly', 'hostile', 'neutral'].includes(a.role)) n.role = a.role;
                            if (a.speed) n.speed = snum(a.speed, 30, 160, n.speed)
                        }
                    }
                    else if (act === 'reward') { const v = Math.round(snum(a.amount, 5, 800, 50)); cash += v; Msg.show('+$' + v, 'rw', 0) }
                    else if (act === 'give') {
                        if (a.kind === 'ammo') ammo = Math.min(99, ammo + Math.round(snum(a.amount, 1, 60, 10)));
                        else if (a.kind === 'heart') hearts = Math.min(maxHearts, hearts + 1);
                        else if (a.kind === 'cash') cash += Math.round(snum(a.amount, 1, 800, 50))
                    }
                    else if (act === 'ability') grantAbility(a.id, a.label || a.name);
                    else if (act === 'heat') { heat = snum(a.set, 0, 5, heat); coolT = 0; if (heat === 0) cops.length = 0 }
                    else if (act === 'timer') { S.timers[sstr(a.id, 14) || 'tmr'] = snum(a.seconds, 2, 240, 30) }
                    else if (act === 'explode') {
                        const v = traffic.find(c => c.svid === a.id) || gangs.find(c => c.svid === a.id) ||
                            (car && car.svid === a.id ? car : null) || S.npcs.find(n => n.id === a.id);
                        if (v) { explode(v.x, v.y, v.ang || 0); if (v.hp !== undefined) v.hp = 0 }
                    }
                    else if (act === 'complete') { if (M.cur) M.finish(true); return }
                    else if (act === 'fail') { if (M.cur) M.finish(false, sstr(a.reason, 40) || 'the Director says so'); return }
                    else if (act === 'banner') UIK.feed(sstr(a.text, 90), 'GOD');
                    else if (act === 'shake') shake = Math.max(shake, 14);
                    else applyOp(a.op ? a : { ...a, op: act }); // world ops double as actions
                    if (state !== 'play') return
                }
            },
            update(dt) {
                if (!S.rules.length && !S.npcs.length && !S.zones.length) { S.bubbles.length = 0; return }
                for (const id in S.timers) {
                    S.timers[id] -= dt;
                    if (S.timers[id] <= 0) { delete S.timers[id]; S.fire('timer:' + id); if (state !== 'play') return }
                }
                for (const z of S.zones) {
                    const inz = Math.hypot(z.x - px, z.y - py) < z.r;
                    if (inz && !S.zoneIn[z.id]) { S.zoneIn[z.id] = 1; S.fire('enter_zone:' + z.id); if (state !== 'play') return }
                    if (!inz && S.zoneIn[z.id]) { S.zoneIn[z.id] = 0; S.fire('exit_zone:' + z.id); if (state !== 'play') return }
                    S.zoneStay[z.id] = inz ? (S.zoneStay[z.id] || 0) + dt : 0;
                    for (const r of S.rules) if (r.when === 'zone_stay' && r.id === z.id && !r.fired && (S.zoneStay[z.id] || 0) >= (r.arg || 5)) {
                        r.fired = true; if (r.once) S.onceDone++; S.runActs(r.do); if (state !== 'play') return
                    }
                }
                const vid = car && car.svid ? car.svid : '';
                if (vid && vid !== S.prevInVeh) { S.prevInVeh = vid; S.fire('in_vehicle:' + vid); if (state !== 'play') return }
                if (!vid) S.prevInVeh = '';
                if (heat > 0) S.hadHeat = true;
                if (S.hadHeat && heat === 0) { S.hadHeat = false; S.fire('heat_zero'); if (state !== 'play') return }
                for (const r of S.rules) {
                    if (r.fired && r.once) continue;
                    let hit = false;
                    if (r.when === 'heat_at' && heat >= (r.arg || 5)) hit = true;
                    if (r.when === 'hearts_below' && hearts < (r.arg || 1)) hit = true;
                    if (r.when === 'npc_near') { const n = S.npcs.find(n => n.id === r.id); if (n && Math.hypot(n.x - px, n.y - py) < (r.arg || 60)) hit = true }
                    if (hit) { if (!r.fired && r.once) S.onceDone++; r.fired = true; S.runActs(r.do); if (state !== 'play') return }
                }
                for (const n of S.npcs) {
                    if (n.gone) continue;
                    n.atkCd = Math.max(0, n.atkCd - dt);
                    const dxp = px - n.x, dyp = py - n.y, dd = Math.hypot(dxp, dyp) || 1;
                    let tx = null, ty = null, sp = n.speed;
                    const bk = n.beh.kind;
                    if (bk === 'follow_player' && dd > 44) { tx = px; ty = py }
                    else if (bk === 'chase_player') { tx = px; ty = py }
                    else if (bk === 'flee_player' && dd < 480) { tx = n.x + (n.x - px); ty = n.y + (n.y - py); sp = n.speed * 1.15 }
                    else if (bk === 'goto') {
                        tx = n.beh.x; ty = n.beh.y;
                        if (Math.hypot(tx - n.x, ty - n.y) < 26 && !n.reached) {
                            n.reached = true; n.beh = { kind: 'guard' };
                            S.fire('npc_reached:' + n.id); if (state !== 'play') return
                        }
                    }
                    else if (bk === 'wander') { n.a += (Math.random() - .5) * dt * 3; tx = n.x + Math.cos(n.a) * 40; ty = n.y + Math.sin(n.a) * 40; sp = 30 }
                    if (tx !== null) {
                        const d2 = Math.hypot(tx - n.x, ty - n.y) || 1;
                        const nx = n.x + (tx - n.x) / d2 * sp * dt, ny = n.y + (ty - n.y) / d2 * sp * dt;
                        if (!solidAt(nx, n.y)) n.x = nx; if (!solidAt(n.x, ny)) n.y = ny
                    }
                    if (n.role === 'hostile' && onFoot && dd < 17 && n.atkCd <= 0) {
                        n.atkCd = 1.1;
                        hurtHeart(-dxp / dd, -dyp / dd, 'attacked by ' + n.name); if (state !== 'play') return
                    }
                    if (!onFoot && dd < 20 && Math.abs(car.v) > 70) { n.hp = 0; if (n.role !== 'hostile') { bump(1); logEvent('player ran over ' + n.name) } }
                    if (n.hp <= 0 && !n.gone) {
                        n.gone = 1; boom(n.x, n.y, 8);
                        logEvent(n.name + ' died'); S.fire('npc_dead:' + n.id); if (state !== 'play') return
                    }
                }
                S.npcs = S.npcs.filter(n => !n.gone);
                S.bubbles = S.bubbles.filter(b => b.t > t)
            }
        };

        /* ================= MISSIONS ================= */
        const M = {
            cur: null, result: null,
            progress() {
                const m = M.cur; if (!m) return 0;
                if (m.verb === 'scene') return S.progress();
                if (m.verb === 'evade') return Math.max(0, Math.min(1, 1 - heat / (m.heat0 || 1)));
                if (m.verb === 'hunt') return m.hunt0 ? 1 - gangs.filter(c => c.hunt).length / m.hunt0 : 0;
                if (m.verb === 'hit') return targetPed ? 0 : 1;
                return m.step / Math.max(1, m.wps.length)
            },
            navTarget() {
                const m = M.cur; if (!m) return null;
                if (m.verb === 'scene') return S.resolveNav();
                if (m.verb === 'hunt') {
                    let bt = null, bd = 1e9;
                    for (const c of gangs) if (c.hunt) { const d = Math.hypot(c.x - px, c.y - py); if (d < bd) { bd = d; bt = c } }
                    return bt
                }
                if (m.verb === 'hit') return targetPed;
                return m.wps[m.step] || null
            },
            cleanup() {
                S.clear(); targetPed = null;
                traffic = traffic.filter(c => !c.mkey || c === car);
                for (const c of gangs) c.hunt = 0
            },
            start(m) {
                M.cleanup(); M.cur = m; m.step = 0; m.t = 0; m.aboard = false; chapterN++;
                (M.hist = M.hist || []).push(m.verb + ':' + m.title); if (M.hist.length > 6) M.hist.shift();
                if (m.verb === 'jack') {
                    const s = snapRoad(m.wps[0].x, m.wps[0].y);
                    traffic.push({ x: s.x, y: s.y, ang: 0, v: 0, hp: 80, mhp: 80, col: '#f472b6', parked: true, mkey: 1 })
                }
                if (m.verb === 'evade') { m.heat0 = Math.max(1, m.heatStart || 2); heat = Math.max(heat, m.heat0); coolT = 0 }
                if (m.verb === 'hunt') {
                    const n = m.reward > 240 ? 2 : 1; m.hunt0 = n;
                    for (let i = 0; i < n; i++) {
                        const f = findFree(m.wps[0].x + i * 80, m.wps[0].y + i * 40, 16);
                        gangs.push({ x: f.x, y: f.y, v: 0, ang: 0, hp: 60, ramCd: 0, hunt: 1 })
                    }
                }
                if (m.verb === 'hit') {
                    const f = findFree(m.wps[0].x, m.wps[0].y, 12);
                    targetPed = { x: f.x, y: f.y, a: Math.random() * 7, hp: 2, flee: false }
                }
                const c = UIK.card(); c.children[0].textContent = m.title;
                c.children[1].textContent = m.briefing;
                c.children[2].textContent = 'CH.' + chapterN + ' · REWARD $' + m.reward + (m.timeLimit ? ' · ' + m.timeLimit + 's limit' : '');
                Msg.show('NEW MISSION: ' + m.title, 'newm', 1); saveGame()
            },
            finish(ok, why) {
                const m = M.cur; if (!m) return; M.cur = null; M.cleanup();
                if (ok) {
                    cash += m.reward; logEvent('mission "' + m.title + '" SUCCEEDED (+$' + m.reward + ')');
                    Msg.show('✔ ' + m.title + ' — +$' + m.reward, 'md', 0)
                }
                else { logEvent('mission "' + m.title + '" FAILED (' + why + ')'); Msg.show('✘ mission failed — ' + why, 'md', 0) }
                M.result = (ok ? 'success' : 'failed: ' + why); saveGame();
                const c = UIK.card(); c.children[0].textContent = ok ? 'MISSION COMPLETE' : 'MISSION FAILED';
                c.children[1].textContent = 'the Director is evaluating your performance…'; c.children[2].textContent = '';
                Director.plan(1800)
            },
            update(dt) {
                const m = M.cur; if (!m) return; m.t += dt;
                if (m.timeLimit && m.t > m.timeLimit) return M.finish(false, 'out of time');
                if (m.verb === 'scene') return;
                if (m.verb === 'evade') { if (heat === 0 && m.t > 2) M.finish(true); return }
                if (m.verb === 'hunt') { if (!gangs.some(c => c.hunt)) M.finish(true); return }
                if (m.verb === 'hit') {
                    if (!targetPed) return M.finish(true);
                    if (Math.hypot(targetPed.x - px, targetPed.y - py) > 1700) return M.finish(false, 'the target escaped');
                    return
                }
                const wp = m.wps[m.step]; if (!wp) return M.finish(true);
                const dd = Math.hypot(wp.x - px, wp.y - py);
                if (m.verb === 'jack' && m.step === 0) {
                    if (car && car.mkey) { m.step = 1; Msg.show('marked car secured — deliver it!', 'mk'); if (m.wps.length < 2) M.finish(true) }
                    return
                }
                if (dd < 46) {
                    if (m.verb === 'taxi') {
                        if (onFoot) { Msg.show('you need a car for the passenger', 'needcar'); return }
                        if (m.step === 0) { m.aboard = true; Msg.show('passenger aboard', 'pax') }
                        else if (!m.aboard) return
                    }
                    if (m.verb === 'race' && onFoot) { Msg.show('checkpoints need wheels', 'wheels'); return }
                    if (m.verb === 'jack' && m.step === 1 && (!car || !car.mkey)) { Msg.show('deliver the MARKED car', 'mkd'); return }
                    m.step++;
                    if (m.step >= m.wps.length) M.finish(true);
                    else Msg.show('checkpoint ' + m.step + '/' + m.wps.length, 'cp', 1)
                }
            }
        };

        function applyOp(op) {
            if (!op || !op.op) return;
            const ox = snum(op.dx, -1400, 1400, 300), oy = snum(op.dy, -1400, 1400, 0);

            if (op.op === 'earthquake') {
                shake = 30;
                for (let i = 0; i < 10; i++) setTimeout(() => boom(px + (Math.random() - .5) * 1200, py + (Math.random() - .5) * 1200, 5), i * 200);
                Msg.show('⚠ MAGNITUDE 8 EARTHQUAKE', 'eq');
            }
            else if (op.op === 'eclipse') {
                weather = 'night';
                for (let i = 0; i < 15; i++) spawnGangster(px + (Math.random() - .5) * 1000, py + (Math.random() - .5) * 1000);
                Msg.show('🌑 THE BLOOD MOON RISES', 'ecl');
            }
            else if (op.op === 'nuke') {
                const s = snapRoad(px + ox, py + oy);
                setTimeout(() => explode(s.x, s.y, 0), 500);
                setTimeout(() => explode(s.x + 80, s.y - 40, 0), 800);
                Msg.show('⚠ ORBITAL BOMBARDMENT', 'strike');
            }
            else if (op.op === 'zombies') {
                for (let i = 0; i < 15; i++) spawnGangster(px + (Math.random() - 0.5) * 800, py + (Math.random() - 0.5) * 800);
                Msg.show('⚠ THE HORDE IS HERE', 'riot');
            }
            else if (op.op === 'airdrop') {
                for (let i = 0; i < 5; i++) pickups.push({ x: px + (Math.random() - .5) * 400, y: py + (Math.random() - .5) * 400, kind: 'cash' });
                for (let i = 0; i < 3; i++) pickups.push({ x: px + (Math.random() - .5) * 400, y: py + (Math.random() - .5) * 400, kind: 'ammo' });
                Msg.show('📦 SUPPLY DROP INBOUND', 'drop');
            }
            else if (op.op === 'lockdown') {
                heat = 5;
                Msg.show('⚠ CITY WIDE LOCKDOWN', 'lock');
            }
            else if (op.op === 'crowd') {
                const s = snapRoad(px + ox, py + oy);
                for (let i = 0; i < snum(op.n, 2, 10, 4); i++)peds.push({
                    x: s.x + (Math.random() * 60 - 30), y: s.y + (Math.random() * 60 - 30),
                    a: Math.random() * 6.28, col: ['#e0c9a6', '#b6c9d6', '#d6b6c9', '#c9d6b6'][Math.random() * 4 | 0]
                })
            }
            else if (op.op === 'gang' && gangs.length < 3) {
                const s = snapRoad(px + ox, py + oy);
                const f = findFree(s.x, s.y, 16); gangs.push({ x: f.x, y: f.y, v: 0, ang: 0, hp: 60, ramCd: 0, hunt: 1 });
                Msg.show('⚠ assassins dispatched', 'gang')
            }
            else if (op.op === 'ambush') {
                const s = snapRoad(px + ox, py + oy);
                for (let i = 0; i < snum(op.n, 2, 5, 3) && gangsters.length < 15; i++)spawnGangster(s.x + i * 20, s.y + i * 14);
                Msg.show('⚠ ambush nearby', 'amb')
            }
            else if (op.op === 'pickup' && pickups.length < 12) {
                const s = snapRoad(px + ox, py + oy);
                const kind = ['heart', 'ammo', 'cash'].includes(op.kind) ? op.kind : 'cash';
                const f = findFree(s.x, s.y, 10); pickups.push({ x: f.x, y: f.y, kind })
            }
            else if (op.op === 'weather') { weather = ['clear', 'rain', 'night', 'fog'].includes(op.kind) ? op.kind : 'clear' }
            else if (op.op === 'traffic') { trafficTarget = snum(op.n, 3, 10, 6) }
            else if (op.op === 'mood') { // the god sets the city's pulse
                trafficTarget = snum(op.traffic, 0, 14, trafficTarget); pedTarget = snum(op.peds, 0, 24, pedTarget);
                if (traffic.filter(c => !c.parked).length > trafficTarget) traffic = traffic.filter((c, i2) => c.parked || i2 % 2 === 0);
                if (peds.length > pedTarget) peds.length = pedTarget
            }
            else if (op.op === 'calm') { heat = 0; coolT = 0; cops.length = 0; Msg.show('the god calls off the hunt', 'calm') }
            else if (op.op === 'panic') {
                const r2 = snum(op.r, 120, 900, 420);
                for (const p2 of peds) if (Math.hypot(p2.x - (px + ox), p2.y - (py + oy)) < r2) p2.flee = true;
                shake = Math.max(shake, 6); Msg.show('😱 PANIC IN THE STREETS', 'panic')

                if (pickups.length < 5 && Math.random() < .5) {
                    const p = roadPoint(250, 600);
                    const kind = hearts < 3 && Math.random() < .3 ? 'heart' : (Math.random() < .55 ? 'ammo' : 'cash');
                    const f = findFree(p.x, p.y, 10); pickups.push({ x: f.x, y: f.y, kind })
                }
            }
            for (const pk of pickups) if (Math.hypot(pk.x - px, pk.y - py) < 20) {
                pk.dead = true;
                if (pk.pid) { S.fire('pickup_taken:' + pk.pid); if (state !== 'play') return }
                if (pk.kind === 'item') { S.items.push(pk.label || pk.pid || 'item'); Msg.show('acquired: ' + (pk.label || 'the item'), 'itm', 0) }
                if (pk.kind === 'heart') { hearts = Math.min(maxHearts, hearts + 1); Msg.show('+1 ♥', 'pkh', 1) }
                if (pk.kind === 'ammo') { ammo = Math.min(99, ammo + 8); Msg.show('+8 ammo', 'pka', 1) }
                if (pk.kind === 'cash') { const v = 25 + (Math.random() * 50 | 0); cash += v; Msg.show('+$' + v, 'pkc', 1) }
            }
            pickups = pickups.filter(p => !p.dead && Math.hypot(p.x - px, p.y - py) < 1600);

            /* peds */
            while (peds.length < pedTarget) spawnPed();
            for (const p of peds) {
                p.a += (Math.random() - .5) * dt * 3;
                let vx = Math.cos(p.a) * 26, vy = Math.sin(p.a) * 26;
                if (!onFoot && Math.abs(car.v) > 90) {
                    const dx = p.x - px, dy = p.y - py, dd = Math.hypot(dx, dy);
                    if (dd < 90 && dd > 0) { vx += dx / dd * 150; vy += dy / dd * 150 }
                }
                const nx2 = p.x + vx * dt, ny2 = p.y + vy * dt;
                if (!solidAt(nx2, ny2)) { p.x = nx2; p.y = ny2 } else p.a += 2;
                if (!onFoot && Math.abs(car.v) > 70 && Math.hypot(p.x - px, p.y - py) < 20) {
                    boom(p.x, p.y, 8); p.dead = true; bump(1); logEvent('player ran over a pedestrian')
                }
            }
            peds = peds.filter(p => !p.dead && Math.hypot(p.x - px, p.y - py) < 1100);

            /* traffic */
            while (traffic.filter(c => !c.parked).length < trafficTarget) spawnTraffic();
            const wf = weather === 'rain' ? .78 : weather === 'fog' ? .85 : 1;
            for (const c of traffic) {
                if (c.parked) continue;
                const pd = Math.hypot(c.x - px, c.y - py);
                const threat = !onFoot && Math.abs(car.v) > 110 && pd < 160;
                const panicked = threat || heat >= 3 && pd < 200;
                let vt = 118 * wf;
                if (panicked) vt = c.tm === 'flee' ? 238 : 6;
                c.v += (vt - c.v) * dt * (panicked ? 4 : 1.2);
                if (panicked && c.tm === 'brake' && pd > 1) { c.x += (c.x - px) / pd * 26 * dt; c.y += (c.y - py) / pd * 26 * dt }

                slideCar(c, dt);

                if (!onFoot) {
                    const dd = Math.hypot(c.x - car.x, c.y - car.y);
                    if (dd < 34 && dd > 0) {
                        const nx3 = (c.x - car.x) / dd, ny3 = (c.y - car.y) / dd;
                        c.x += nx3 * (34 - dd); c.y += ny3 * (34 - dd);
                        const impact = Math.abs(car.v) + Math.abs(c.v) * .4;
                        if (impact > 130) {
                            const dmg = (impact - 110) / 6; c.hp -= dmg; car.hp -= dmg * .45; boom((c.x + car.x) / 2, (c.y + car.y) / 2, 4);
                            if (impact > 300) hurtHeart(-Math.cos(car.ang) * .5, -Math.sin(car.ang) * .5, 'head-on collision')
                        }
                        car.v *= .6
                    }
                }
                else {
                    const dd = Math.hypot(c.x - px, c.y - py);
                    if (dd < 22) {
                        if (c.v > 90) hurtHeart((px - c.x) / 22, (py - c.y) / 22, 'hit by a car');
                        else if (dd > 1) { px += (px - c.x) / dd * 40 * dt; py += (py - c.y) / dd * 40 * dt }
                    }
                }
            }

            const ci = Math.floor(px / T), cj = Math.floor(py / T);
            for (let i = ci - 2; i <= ci + 2; i++)for (let j = cj - 2; j <= cj + 2; j++) {
                const lc = lotCarAt(i, j);
                if (lc && !traffic.some(c => c.key === lc.key)) {
                    traffic.push({ x: lc.x, y: lc.y, ang: lc.vert ? PI / 2 : 0, v: 0, hp: 60, mhp: 60, col: lc.col, parked: true, key: lc.key });
                    takenLots[lc.key] = false
                }
            }
            for (const c of traffic) if (c.key && !c.parked) takenLots[c.key] = true;

            /* cops */
            const wantCops = heat >= 2 ? Math.min(6, heat + (heat >= 4 ? 1 : 0)) : (heat === 1 ? Math.min(cops.length, 1) : 0);
            copSpawnT -= dt;
            if (cops.length < wantCops && copSpawnT <= 0) {
                copSpawnT = 1.3;
                const p = ring_(520, 700), f = findFree(p.x, p.y, 16);
                cops.push({ x: f.x, y: f.y, v: 0, ang: 0, hp: 70, ramCd: 0, stuck: 0 })
            }
            if (cops.length > wantCops) cops.length = wantCops;
            let copNear = false, grabbing = false;
            for (const c of cops) {
                c.ramCd = Math.max(0, c.ramCd - dt);

                const dx = px - c.x, dy = py - c.y, dd = Math.hypot(dx, dy) || 1;
                c.ang += cl(na(Math.atan2(dy, dx) - c.ang)) * 2.5 * dt;
                c.v += ((280 + heat * 16) * wf - c.v) * dt * 1.5;

                const oldX = c.x, oldY = c.y;
                slideCar(c, dt);

                if (Math.hypot(c.x - oldX, c.y - oldY) < 1) c.stuck += dt; else c.stuck = 0;
                if (c.stuck > 1.5) {
                    const f = findFree(c.x, c.y, 14); c.x = f.x; c.y = f.y; c.v = -100; c.stuck = 0;
                }

                if (dd < 380) copNear = true;
                if (onFoot && dd < 30) return gameOver('BUSTED');
                if (!onFoot && dd < 40 && c.ramCd <= 0) {
                    c.ramCd = .7; car.hp -= 7 + heat * 2.2; car.v *= .82; shake = Math.max(shake, 3);
                    boom((c.x + px) / 2, (c.y + py) / 2, 6);
                    const nn = { x: (c.x - px) / dd, y: (c.y - py) / dd }; c.x += nn.x * 26; c.y += nn.y * 26; c.v *= .5
                }
                if (!onFoot && dd < 58 && Math.abs(car.v) < 28) grabbing = true;
                if (!onFoot && dd < 34 && Math.abs(car.v) > 150) c.hp -= (Math.abs(car.v) - 130) / 5
            }
            if (grabbing) {
                grabT += dt * (heat >= 3 ? 1.25 : 1);
                if (grabT >= 1.6) return gameOver('BUSTED')
            }
            else grabT = Math.max(0, grabT - dt * 1.6);
            for (const c of cops) if (c.hp <= 0) { explode(c.x, c.y, c.ang); c.dead = true; bump(1); logEvent('player destroyed a police car') }
            cops = cops.filter(c => !c.dead);

            /* gangs */
            for (const c of gangs) {
                c.ramCd = Math.max(0, c.ramCd - dt);

                const dx = px - c.x, dy = py - c.y, dd = Math.hypot(dx, dy) || 1;
                c.ang += cl(na(Math.atan2(dy, dx) - c.ang)) * 2.5 * dt;
                c.v += (265 * wf - c.v) * dt * 1.5;

                const oldX = c.x, oldY = c.y;
                slideCar(c, dt);

                if (Math.hypot(c.x - oldX, c.y - oldY) < 1) c.stuck = (c.stuck || 0) + dt; else c.stuck = 0;
                if (c.stuck > 1.5) { const f = findFree(c.x, c.y, 14); c.x = f.x; c.y = f.y; c.v = -100; c.stuck = 0; }

                if (!onFoot && dd < 40 && c.ramCd <= 0) {
                    c.ramCd = .8; car.hp -= 10; car.v *= .8; boom((c.x + px) / 2, (c.y + py) / 2, 6); shake = Math.max(shake, 3);
                    const nn = { x: (c.x - px) / dd, y: (c.y - py) / dd }; c.x += nn.x * 26; c.y += nn.y * 26; c.v *= .5
                }
                if (onFoot && dd < 22 && c.v > 90) hurtHeart((px - c.x) / dd, (py - c.y) / dd, 'gang hit-and-run');
                if (!onFoot && dd < 34 && Math.abs(car.v) > 150) c.hp -= (Math.abs(car.v) - 130) / 5;
                if (dd > 1800) c.far = (c.far || 0) + dt; else c.far = 0;
                if (c.far > 6 && !c.hunt) c.dead = true
            }
            for (const c of gangs) if (c.hp <= 0 && !c.dead) {
                explode(c.x, c.y, c.ang); c.dead = true; cash += 40;
                if (c.svid) { S.fire('vehicle_destroyed:' + c.svid); if (state !== 'play') return }
                spawnGangster(c.x + 20, c.y); spawnGangster(c.x - 20, c.y);
                logEvent('player destroyed a gang car (+$40)'); Msg.show('gang car down +$40 — crew bailed out!', 'gk', 1)
            }
            gangs = gangs.filter(c => !c.dead);

            /* traffic explosions */
            for (const c of traffic) if (c.hp <= 0) {
                explode(c.x, c.y, c.ang); c.gone = true;
                if (c.svid) { S.fire('vehicle_destroyed:' + c.svid); if (state !== 'play') return }
                if (c.mkey && M.cur && M.cur.verb === 'jack') M.finish(false, 'the marked car was destroyed')
            }
            traffic = traffic.filter(c => !c.gone && (c.parked ? Math.hypot(c.x - px, c.y - py) < 1300 : Math.hypot(c.x - px, c.y - py) < 980));

            if (heat > 0) { // low heat cools even mid-chase (half speed); 3+ stars require escaping
                coolT += dt * (copNear ? (heat >= 3 ? 0 : .5) : 1);
                if (coolT > 6) { heat--; coolT = 0; if (heat === 0) { Msg.show('heat lost — clean', 'cool'); cops.length = 0 } }
            }

            for (const sk of skids) sk.a -= dt * .1;
            skids = skids.filter(sk => sk.a > 0); if (skids.length > 160) skids.splice(0, skids.length - 160);
            for (const p of parts) { p.x += p.vx * dt; p.y += p.vy * dt; p.a -= dt * 1.8 }
            parts = parts.filter(p => p.a > 0);
            for (const r of rings) { r.r += 260 * dt; r.a -= dt * 1.8 }
            rings = rings.filter(r => r.a > 0);
            for (const wk of wrecks) {
                wk.life -= dt;
                if (wk.life > 7 && Math.random() < dt * 10) parts.push({ x: wk.x, y: wk.y - 4, vx: (Math.random() - .5) * 20, vy: -40, a: .8, c: '#6b7280' })
            }
            wrecks = wrecks.filter(w => w.life > 0);
        }

        /* ================= DRAW ================= */
        function draw() {
            g.fillStyle = '#15171c'; g.fillRect(0, 0, W, H);
            g.save();
            if (shake > 0.3) g.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);
            g.scale(Z, Z);
            const Wv = W / Z, Hv = H / Z, camx = px - Wv / 2 + lookX, camy = py - Hv / 2 + lookY, PSX = Wv / 2 - lookX, PSY = Hv / 2 - lookY;
            const i0 = Math.floor(camx / T) - 1, i1 = Math.floor((camx + Wv) / T) + 1, j0 = Math.floor(camy / T) - 1, j1 = Math.floor((camy + Hv) / T) + 1;
            const night = weather === 'night';

            // roads
            g.fillStyle = '#22252c';
            for (let i = i0; i <= i1; i++)g.fillRect(i * T - camx, 0, RW, Hv);
            for (let j = j0; j <= j1; j++)g.fillRect(0, j * T - camy, Wv, RW);
            g.strokeStyle = 'rgba(255,220,120,.28)'; g.lineWidth = 2; g.setLineDash([14, 18]);
            for (let i = i0; i <= i1; i++) { g.beginPath(); g.moveTo(i * T + RW / 2 - camx, 0); g.lineTo(i * T + RW / 2 - camx, Hv); g.stroke() }
            for (let j = j0; j <= j1; j++) { g.beginPath(); g.moveTo(0, j * T + RW / 2 - camy); g.lineTo(Wv, j * T + RW / 2 - camy); g.stroke() }
            g.setLineDash([]);

            // crosswalks
            g.fillStyle = 'rgba(255,255,255,.09)';
            for (let i = i0; i <= i1; i++)for (let j = j0; j <= j1; j++) {
                const cx2 = i * T - camx, cy2 = j * T - camy;
                for (let s2 = 0; s2 < 4; s2++) {
                    g.fillRect(cx2 + 13 + s2 * 18, cy2 - 24, 9, 18); g.fillRect(cx2 + 13 + s2 * 18, cy2 + RW + 6, 9, 18);
                    g.fillRect(cx2 - 24, cy2 + 13 + s2 * 18, 18, 9); g.fillRect(cx2 + RW + 6, cy2 + 13 + s2 * 18, 18, 9)
                }
            }
            // skid marks
            g.fillStyle = 'rgba(10,10,12,.5)';
            for (const sk of skids) { g.globalAlpha = sk.a; g.fillRect(sk.x - camx - 2.5, sk.y - camy - 2.5, 5, 5) }
            g.globalAlpha = 1;

            // building cast shadows
            g.fillStyle = 'rgba(0,0,0,.24)';
            for (let i = i0; i <= i1; i++)for (let j = j0; j <= j1; j++)
                if (blockType(i, j) === 'bldg') g.fillRect(i * T + RW - camx + 8, j * T + RW - camy + 10, BS, BS);

            // blocks
            for (let i = i0; i <= i1; i++)for (let j = j0; j <= j1; j++) {
                const x = i * T + RW - camx, y = j * T + RW - camy, tp = blockType(i, j);
                if (tp === 'bldg') {
                    const roof = BPAL[(hsh(i, j, 5) * 6) | 0];
                    g.fillStyle = '#191d27'; g.fillRect(x, y, BS, BS);
                    g.fillStyle = roof; g.fillRect(x, y, BS - 8, BS - 8);
                    g.fillStyle = 'rgba(255,255,255,.06)'; g.fillRect(x, y, BS - 8, 4); g.fillRect(x, y, 4, BS - 8);
                    g.fillStyle = 'rgba(255,240,170,' + ((night ? 0.24 : 0.06) + hsh(i, j, 6) * .08) + ')';
                    const wn = 3 + (hsh(i, j, 7) * 3 | 0);
                    for (let a = 0; a < wn; a++)for (let b = 0; b < wn; b++)
                        if (hsh(i * 9 + a, j * 9 + b, 8) < .4) g.fillRect(x + 12 + a * (BS - 30) / wn, y + 12 + b * (BS - 30) / wn, 8, 10);
                    g.fillStyle = 'rgba(0,0,0,.3)';
                    if (hsh(i, j, 9) < .7) g.fillRect(x + 18 + hsh(i, j, 11) * 70, y + 18 + hsh(i, j, 12) * 70, 16, 14);
                    if (hsh(i, j, 13) < .4) g.fillRect(x + 30 + hsh(i, j, 14) * 60, y + 40 + hsh(i, j, 15) * 60, 12, 12);
                    g.strokeStyle = 'rgba(0,0,0,.4)'; g.strokeRect(x, y, BS, BS)
                }
                else if (tp === 'park') {
                    g.fillStyle = '#233327'; g.fillRect(x, y, BS, BS);
                    for (let kk = 0; kk < 5; kk++) {
                        const tx = x + 20 + hsh(i, j, 10 + kk) * (BS - 40), ty = y + 20 + hsh(i, j, 20 + kk) * (BS - 40);
                        g.fillStyle = 'rgba(0,0,0,.25)'; g.beginPath(); g.arc(tx + 3, ty + 4, 10 + hsh(i, j, 30 + kk) * 8, 0, 7); g.fill();
                        g.fillStyle = '#2f4a33'; g.beginPath(); g.arc(tx, ty, 10 + hsh(i, j, 30 + kk) * 8, 0, 7); g.fill()
                    }
                }
                else if (tp === 'farm') {
                    g.fillStyle = '#2c3322'; g.fillRect(x, y, BS, BS);
                    for (let kk = 0; kk < 7; kk++) {
                        g.fillStyle = kk % 2 ? '#3a3a26' : '#333a24';
                        g.fillRect(x + 8, y + 10 + kk * 22, BS - 16, 12)
                    }
                    g.fillStyle = '#4a6a3a';
                    for (let kk = 0; kk < 12; kk++)g.fillRect(x + 14 + (kk % 4) * 38 + hsh(i, j, 40 + kk) * 14, y + 14 + ((kk / 4) | 0) * 48 + hsh(i, j, 60 + kk) * 12, 5, 5)
                }
                else if (tp === 'plaza') {
                    g.fillStyle = '#23262e'; g.fillRect(x, y, BS, BS);
                    g.strokeStyle = 'rgba(255,255,255,.07)'; g.lineWidth = 1;
                    for (let kk = 1; kk < 5; kk++) {
                        g.beginPath(); g.moveTo(x + kk * BS / 5, y); g.lineTo(x + kk * BS / 5, y + BS); g.stroke();
                        g.beginPath(); g.moveTo(x, y + kk * BS / 5); g.lineTo(x + BS, y + kk * BS / 5); g.stroke()
                    }
                    g.strokeStyle = 'rgba(255,255,255,.10)'; g.beginPath(); g.arc(x + BS / 2, y + BS / 2, 34, 0, 7); g.stroke()
                }
                else if (tp.charCodeAt && tp.length > 2 && tp.charCodeAt(1) === 58) { // 'g:*' — an AI-invented ground block
                    const gk = tp.slice(2);
                    g.fillStyle = GCOL[gk] || '#262a33'; g.fillRect(x, y, BS, BS);
                    if (gk === 'water') {
                        g.strokeStyle = 'rgba(140,190,235,.15)'; g.lineWidth = 2;
                        for (let kk = 0; kk < 4; kk++) {
                            const wy = y + 26 + kk * 40;
                            g.beginPath(); g.moveTo(x + 10, wy + Math.sin(t * 1.3 + kk * 2) * 3);
                            g.bezierCurveTo(x + BS / 3, wy - 9, x + BS * 2 / 3, wy + 9, x + BS - 10, wy + Math.cos(t * 1.1 + kk) * 3); g.stroke()
                        }
                    }
                    else if (gk === 'sand') { g.fillStyle = 'rgba(255,240,190,.09)'; for (let kk = 0; kk < 14; kk++)g.fillRect(x + 4 + ((kk * 53) % (BS - 10)), y + 4 + ((kk * 37) % (BS - 10)), 3, 3) }
                    else if (gk === 'soil') { g.strokeStyle = 'rgba(0,0,0,.25)'; g.lineWidth = 3; for (let kk = 1; kk < 6; kk++) { g.beginPath(); g.moveTo(x + 8, y + kk * BS / 6); g.lineTo(x + BS - 8, y + kk * BS / 6); g.stroke() } }
                    else if (gk === 'grass') { g.fillStyle = 'rgba(110,180,110,.10)'; for (let kk = 0; kk < 10; kk++)g.fillRect(x + 5 + ((kk * 61) % (BS - 12)), y + 5 + ((kk * 43) % (BS - 12)), 4, 2) }
                    else { g.strokeStyle = 'rgba(255,255,255,.06)'; g.lineWidth = 1; for (let kk = 1; kk < 5; kk++) { g.beginPath(); g.moveTo(x + kk * BS / 5, y); g.lineTo(x + kk * BS / 5, y + BS); g.stroke(); g.beginPath(); g.moveTo(x, y + kk * BS / 5); g.lineTo(x + BS, y + kk * BS / 5); g.stroke() } }
                }
                else {
                    g.fillStyle = '#1d2026'; g.fillRect(x, y, BS, BS);
                    g.strokeStyle = 'rgba(255,255,255,.1)';
                    for (let kk = 1; kk < 4; kk++) { g.beginPath(); g.moveTo(x + kk * BS / 4, y + 20); g.lineTo(x + kk * BS / 4, y + BS - 20); g.stroke() }
                }
                const lm = lmIdx[i + ',' + j]; if (lm) drawLandmark(x, y, lm, night)
            }

            for (const wk of wrecks) {
                g.save(); g.translate(wk.x - camx, wk.y - camy); g.rotate(wk.ang);
                g.fillStyle = '#1c1f24'; g.fillRect(-20, -11, 40, 22);
                g.fillStyle = 'rgba(251,146,60,' + Math.max(0, (wk.life - 7) / 2) * .8 + ')'; g.fillRect(-8, -5, 16, 10);
                g.strokeStyle = '#000'; g.strokeRect(-20, -11, 40, 22); g.restore()
            }

            for (const pk of pickups) {
                const x = pk.x - camx, y = pk.y - camy, pu = 1 + Math.sin(t * 5) * .15;
                if (pk.kind === 'heart') { g.fillStyle = '#f87171'; g.font = 'bold ' + 16 * pu + 'px ui-monospace'; g.textAlign = 'center'; g.fillText('♥', x, y + 6) }
                if (pk.kind === 'ammo') {
                    g.fillStyle = '#fbbf24'; g.fillRect(x - 8, y - 6, 16, 12); g.fillStyle = '#7c5806'; g.fillText && 0;
                    g.fillStyle = '#78350f'; g.font = 'bold 9px ui-monospace'; g.textAlign = 'center'; g.fillText('AMMO', x, y + 3)
                }
                if (pk.kind === 'cash') { g.fillStyle = '#4ade80'; g.font = 'bold ' + 15 * pu + 'px ui-monospace'; g.textAlign = 'center'; g.fillText('$', x, y + 5) }
            }

            // scene zones — the Director's stage marks
            for (const z of S.zones) {
                if (!z.visible) continue;
                const zx = z.x - camx, zy = z.y - camy, zc = LPAL[z.color] || '#4ade80';
                g.strokeStyle = zc; g.lineWidth = 3; g.setLineDash([10, 8]);
                g.globalAlpha = .45 + .3 * Math.sin(t * 3);
                g.beginPath(); g.arc(zx, zy, z.r, 0, 7); g.stroke(); g.setLineDash([]); g.globalAlpha = 1;
                if (z.label) { g.fillStyle = zc; g.font = 'bold 11px ui-monospace'; g.textAlign = 'center'; g.fillText(z.label, zx, zy - z.r - 8) }
            }

            if (M.cur) M.cur.wps.forEach((wp, i) => {
                if (['hunt', 'hit', 'scene'].includes(M.cur.verb)) return;
                const gx = wp.x - camx, gy = wp.y - camy, curW = i === M.cur.step;
                if (i < M.cur.step) return;
                g.globalAlpha = curW ? 1 : .35;
                g.fillStyle = curW ? '#4ade80' : '#9ca3af';
                g.save(); g.translate(gx, gy); g.rotate(t * 2); g.fillRect(-10, -10, 20, 20); g.restore();
                g.font = '11px ui-monospace'; g.textAlign = 'center';
                g.fillText(wp.label || (M.cur.verb === 'deliver' && i === 0 ? 'PICKUP' : M.cur.verb === 'jack' && i === 0 ? 'MARKED CAR' : 'GO'), gx, gy - 18);
                g.globalAlpha = 1
            });

            g.fillStyle = 'rgba(0,0,0,.28)';
            for (const c of traffic) { g.beginPath(); g.ellipse(c.x - camx + 3, c.y - camy + 5, 22, 12, c.ang, 0, 7); g.fill() }
            for (const c of gangs) { g.beginPath(); g.ellipse(c.x - camx + 3, c.y - camy + 5, 22, 12, c.ang, 0, 7); g.fill() }
            for (const c of cops) { g.beginPath(); g.ellipse(c.x - camx + 3, c.y - camy + 5, 22, 12, c.ang, 0, 7); g.fill() }

            for (const c of traffic) {
                drawCar(c.x - camx, c.y - camy, c.ang, c.col, false, c, night);
                if (c.mkey) {
                    g.fillStyle = '#f472b6'; g.save(); g.translate(c.x - camx, c.y - camy - 24); g.rotate(t * 3);
                    g.fillRect(-5, -5, 10, 10); g.restore()
                }
            }
            for (const p of peds) {
                g.fillStyle = 'rgba(0,0,0,.25)'; g.beginPath(); g.arc(p.x - camx + 2, p.y - camy + 3, 6, 0, 7); g.fill();
                g.fillStyle = p.col; g.beginPath(); g.arc(p.x - camx, p.y - camy, 6, 0, 7); g.fill();
                g.fillStyle = 'rgba(0,0,0,.5)'; g.beginPath(); g.arc(p.x - camx, p.y - camy, 2.5, 0, 7); g.fill()
            }
            for (const gg of gangsters) {
                g.fillStyle = 'rgba(0,0,0,.25)'; g.beginPath(); g.arc(gg.x - camx + 2, gg.y - camy + 3, 7, 0, 7); g.fill();
                g.fillStyle = '#b91c1c'; g.beginPath(); g.arc(gg.x - camx, gg.y - camy, 7, 0, 7); g.fill();
                g.fillStyle = '#000'; g.fillRect(gg.x - camx - 5, gg.y - camy - 9, 10, 3)
            }
            if (targetPed) {
                const tp = targetPed;
                g.fillStyle = '#fb923c'; g.beginPath(); g.arc(tp.x - camx, tp.y - camy, 7, 0, 7); g.fill();
                g.strokeStyle = '#fb923c'; g.setLineDash([3, 4]);
                g.beginPath(); g.arc(tp.x - camx, tp.y - camy, 14 + Math.sin(t * 4) * 3, 0, 7); g.stroke(); g.setLineDash([]);
                g.font = '10px ui-monospace'; g.textAlign = 'center'; g.fillText('TARGET', tp.x - camx, tp.y - camy - 18)
            }

            for (const c of gangs) drawCar(c.x - camx, c.y - camy, c.ang, '#b91c1c', false, c, night);
            for (const c of cops) drawCar(c.x - camx, c.y - camy, c.ang, '#e8e8ee', true, c, night);

            // scene npcs — the Director's cast
            for (const n of S.npcs) {
                const nx2 = n.x - camx, ny2 = n.y - camy, nc = LPAL[n.color] || '#e8e8ee';
                g.fillStyle = 'rgba(0,0,0,.25)'; g.beginPath(); g.arc(nx2 + 2, ny2 + 3, 8, 0, 7); g.fill();
                g.fillStyle = nc; g.beginPath(); g.arc(nx2, ny2, 8, 0, 7); g.fill();
                g.strokeStyle = n.role === 'hostile' ? '#ef4444' : n.role === 'friendly' ? '#4ade80' : 'rgba(255,255,255,.55)';
                g.lineWidth = 2; g.beginPath(); g.arc(nx2, ny2, 11.5, 0, 7); g.stroke();
                g.fillStyle = '#e7e9ee'; g.font = 'bold 9px ui-monospace'; g.textAlign = 'center'; g.fillText(n.name, nx2, ny2 - 17)
            }
            // speech bubbles
            for (const b of S.bubbles) {
                const n = S.npcs.find(n2 => n2.id === b.nid); if (!n) continue;
                const bx = n.x - camx, by = n.y - camy - 32, txt = b.text.slice(0, 40);
                g.font = '10px ui-monospace';
                const mt = g.measureText ? g.measureText(txt) : null;
                const w2 = Math.min(230, ((mt && mt.width) || txt.length * 6) + 16);
                g.fillStyle = 'rgba(240,242,248,.96)';
                g.fillRect(bx - w2 / 2, by - 15, w2, 19);
                g.beginPath(); g.moveTo(bx - 4, by + 4); g.lineTo(bx + 4, by + 4); g.lineTo(bx, by + 10); g.closePath(); g.fill();
                g.fillStyle = '#14161d'; g.textAlign = 'center'; g.fillText(txt, bx, by - 2)
            }

            g.fillStyle = '#fde68a';
            for (const b of bullets) g.fillRect(b.x - camx - 2, b.y - camy - 2, 4, 4);

            if (!(invT > 0 && Math.sin(t * 24) > 0)) {
                if (onFoot) {
                    g.fillStyle = 'rgba(0,0,0,.3)'; g.beginPath(); g.arc(PSX + 2, PSY + 3, 9, 0, 7); g.fill();
                    g.fillStyle = godT > 0 ? (Math.sin(t * 15) > 0 ? '#ffffff' : '#ffd166') : '#ffd166';
                    g.beginPath(); g.arc(PSX, PSY, 9, 0, 7); g.fill();
                    g.fillStyle = '#101216'; g.beginPath(); g.arc(PSX + Math.cos(facing) * 3.5, PSY + Math.sin(facing) * 3.5, 3, 0, 7); g.fill()
                }
                else if (car) {
                    drawCar(PSX, PSY, car.ang, car.mkey ? '#f472b6' : (godT > 0 && Math.sin(t * 15) > 0 ? '#ffffff' : '#ffd166'), false, null, night, true);
                }
            }

            if (grabT > 0 && !onFoot) {
                g.strokeStyle = '#f87171'; g.lineWidth = 4;
                g.beginPath(); g.arc(PSX, PSY, 26, -PI / 2, -PI / 2 + 6.28 * Math.min(1, grabT / 1.6)); g.stroke();
                g.fillStyle = '#f87171'; g.font = 'bold 11px ui-monospace'; g.textAlign = 'center';
                g.fillText('DRIVE!', PSX, PSY - 34)
            }

            for (const p of parts) { g.globalAlpha = Math.max(0, p.a); g.fillStyle = p.c; g.fillRect(p.x - camx - 3, p.y - camy - 3, 6, 6) }
            g.globalAlpha = 1;
            for (const r of rings) {
                g.globalAlpha = Math.max(0, r.a); g.strokeStyle = '#fbbf24'; g.lineWidth = 3;
                g.beginPath(); g.arc(r.x - camx, r.y - camy, r.r, 0, 7); g.stroke()
            }
            g.globalAlpha = 1;

            // atmosphere
            if (night) {
                g.fillStyle = 'rgba(8,12,34,.44)'; g.fillRect(0, 0, Wv, Hv);
                for (let i = i0; i <= i1; i++)for (let j = j0; j <= j1; j++) {
                    const lx = i * T + RW / 2 - camx, ly = j * T + RW / 2 - camy;
                    const gr = g.createRadialGradient(lx, ly, 4, lx, ly, 66);
                    gr.addColorStop(0, 'rgba(255,214,130,.16)'); gr.addColorStop(1, 'rgba(255,214,130,0)');
                    g.fillStyle = gr; g.fillRect(lx - 66, ly - 66, 132, 132);
                    g.fillStyle = '#ffe9b0'; g.fillRect(lx - 1.5, ly - 1.5, 3, 3)
                }
                const beam = (x, y, a) => {
                    g.fillStyle = 'rgba(255,236,180,.10)';
                    g.beginPath(); g.moveTo(x + Math.cos(a) * 18, y + Math.sin(a) * 18);
                    g.lineTo(x + Math.cos(a - .3) * 95, y + Math.sin(a - .3) * 95);
                    g.lineTo(x + Math.cos(a + .3) * 95, y + Math.sin(a + .3) * 95); g.closePath(); g.fill()
                };
                for (const c of traffic) if (!c.parked) beam(c.x - camx, c.y - camy, c.ang);
                for (const c of cops) beam(c.x - camx, c.y - camy, c.ang);
                if (car) beam(PSX, PSY, car.ang)
            }
            if (weather === 'fog') {
                g.fillStyle = 'rgba(190,200,215,.16)'; g.fillRect(0, 0, Wv, Hv);
                const fg = g.createRadialGradient(Wv / 2, Hv / 2, 120, Wv / 2, Hv / 2, Math.max(Wv, Hv) * .55);
                fg.addColorStop(0, 'rgba(190,200,215,0)'); fg.addColorStop(1, 'rgba(190,200,215,.42)');
                g.fillStyle = fg; g.fillRect(0, 0, Wv, Hv)
            }
            if (weather === 'rain') { g.fillStyle = 'rgba(40,60,100,.10)'; g.fillRect(0, 0, Wv, Hv) }
            g.restore();
            if (weather === 'rain') {
                g.strokeStyle = 'rgba(150,190,255,.35)'; g.lineWidth = 1;
                for (let i = 0; i < 50; i++) {
                    const x = (i * 97 + t * 640) % (W + 40) - 20, y = (i * 61 + t * 900) % (H + 40) - 20;
                    g.beginPath(); g.moveTo(x, y); g.lineTo(x - 4, y + 14); g.stroke()
                }
            }

            const vg = g.createRadialGradient(W / 2, H / 2, Math.min(W, H) * .35, W / 2, H / 2, Math.max(W, H) * .72);
            vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,.34)');
            g.fillStyle = vg; g.fillRect(0, 0, W, H);

            const nav = M.navTarget && M.navTarget();
            if (nav && state === 'play') {
                const dist = Math.hypot(nav.x - px, nav.y - py);
                const an = Math.atan2(nav.y - py, nav.x - px);
                const pcx = W / 2 - lookX * Z, pcy = H / 2 - lookY * Z;
                const sx = (nav.x - px) * Z + pcx, sy = (nav.y - py) * Z + pcy;
                const offscreen = sx < 30 || sx > W - 30 || sy < 30 || sy > H - 30;
                if (offscreen || dist > 320) {
                    const ax = pcx + Math.cos(an) * 56, ay = pcy + Math.sin(an) * 56;
                    g.save(); g.translate(ax, ay); g.rotate(an); g.fillStyle = '#4ade80';
                    g.beginPath(); g.moveTo(16, 0); g.lineTo(-7, 9); g.lineTo(-2, 0); g.lineTo(-7, -9); g.closePath(); g.fill(); g.restore();
                    g.fillStyle = '#4ade80'; g.font = 'bold 11px ui-monospace'; g.textAlign = 'center';
                    g.fillText(Math.round(dist / 10) + 'm', ax, ay + 24)
                }
            }
            drawMinimap(nav);
        }

        function drawMinimap(nav) {
            const r = Math.round(58 * U), mx = 16 + r, my = 132 + r;
            g.save();
            g.beginPath(); g.arc(mx, my, r, 0, 7); g.clip();
            g.fillStyle = 'rgba(34,37,44,.94)'; g.fillRect(mx - r, my - r, r * 2, r * 2);
            const SC = r / 700;
            const i0 = Math.floor((px - 700) / T), i1 = Math.floor((px + 700) / T), j0 = Math.floor((py - 700) / T), j1 = Math.floor((py + 700) / T);
            for (let i = i0; i <= i1; i++)for (let j = j0; j <= j1; j++) {
                const tp = blockType(i, j);
                const x = mx + (i * T + RW - px) * SC, y = my + (j * T + RW - py) * SC, s = BS * SC;
                g.fillStyle = tp === 'bldg' ? '#12141b' : tp === 'park' ? '#1d2b20' : tp === 'farm' ? '#28281a' : tp === 'plaza' ? '#1e222b' : '#181a20';
                g.fillRect(x, y, s, s)
            }
            const blip = (x, y, col, sz) => {
                const bx = mx + (x - px) * SC, by = my + (y - py) * SC;
                const d = Math.hypot(bx - mx, by - my), m = Math.min(1, (r - 5) / (d || 1));
                g.fillStyle = col; g.beginPath(); g.arc(mx + (bx - mx) * m, my + (by - my) * m, sz || 2.6, 0, 7); g.fill()
            };
            for (const c of cops) blip(c.x, c.y, '#60a5fa');
            for (const c of gangs) blip(c.x, c.y, '#ef4444');
            for (const gg of gangsters) blip(gg.x, gg.y, '#ef4444', 2);
            for (const pk of pickups) blip(pk.x, pk.y, '#fbbf24', 2);
            for (const c of traffic) if (c.mkey) blip(c.x, c.y, '#f472b6');
            if (targetPed) blip(targetPed.x, targetPed.y, '#fb923c', 3);
            for (const z of S.zones) if (z.visible) blip(z.x, z.y, LPAL[z.color] || '#4ade80', 3);
            for (const n2 of S.npcs) blip(n2.x, n2.y, n2.role === 'hostile' ? '#ef4444' : (LPAL[n2.color] || '#fff'), 2.4);
            for (const pr of props) { const c2 = blockCenter(pr.bi, pr.bj); blip(c2.x, c2.y, pr.owned ? '#4ade80' : '#fbbf24', 3.2) }
            for (const lm2 of landmarks) { const c3 = blockCenter(lm2.bi, lm2.bj); blip(c3.x, c3.y, LPAL[lm2.color] || '#ffd166', 2.2) }
            if (nav) blip(nav.x, nav.y, '#4ade80', 3.4);
            g.save(); g.translate(mx, my); g.rotate(onFoot ? facing : (car ? car.ang : 0));
            g.fillStyle = '#ffd166'; g.beginPath(); g.moveTo(6, 0); g.lineTo(-4, 4); g.lineTo(-4, -4); g.closePath(); g.fill(); g.restore();
            g.restore();
            g.strokeStyle = 'rgba(255,209,102,.6)'; g.lineWidth = 2;
            g.beginPath(); g.arc(mx, my, r, 0, 7); g.stroke()
        }

        function drawLandmark(x, y, lm, night) {
            const col = LPAL[lm.color] || '#ffd166';
            const walkable = !!WALK_STYLES[lm.style] || (lm.style === 'custom' && lm.walk);
            if (lm.gold) { g.fillStyle = 'rgba(251,191,36,.06)'; g.fillRect(x - RW, y - RW, T, T) }
            if (lm.style === 'wonder') {
                g.fillStyle = '#191d27'; g.fillRect(x, y, BS, BS);
                g.fillStyle = '#20242f'; g.fillRect(x, y, BS - 8, BS - 8);
                g.fillStyle = 'rgba(255,255,255,.06)'; g.fillRect(x, y, BS - 8, 4); g.fillRect(x, y, 4, BS - 8);
                drawGlyph(x + (BS - 8) / 2, y + (BS - 8) / 2 + 2, 96, lm.glyph || 'pyramid', col)
            }
            else if (walkable) {
                // terrain draws itself; invented grounds carry painted markings (court lines, helipad H) — never a rooftop icon
                if (lm.style === 'custom') { if (lm.glyph) drawGlyph(x + BS / 2, y + BS / 2 + 2, BS - 14, lm.glyph, col, 2) }
                else if (lm.glyph && !['park', 'farm', 'plaza'].includes(lm.style)) drawGlyph(x + BS / 2, y + BS / 2 + 2, 104, lm.glyph, col, true)
            }
            else {
                g.fillStyle = '#232733'; g.fillRect(x, y, BS - 8, BS - 8);
                if (lm.style === 'tower') {
                    g.fillStyle = 'rgba(0,0,0,.4)'; g.fillRect(x + 10, y + 10, BS - 28, BS - 28);
                    g.fillStyle = col; g.fillRect(x + 10, y + 10, BS - 28, 6);
                    for (let r2 = 0; r2 < 5; r2++)for (let c2 = 0; c2 < 5; c2++) {
                        g.fillStyle = 'rgba(255,240,180,' + ((night ? .5 : .16) * ((r2 * 5 + c2) % 3 ? 1 : .35)) + ')';
                        g.fillRect(x + 18 + c2 * 26, y + 24 + r2 * 25, 12, 13)
                    }
                }
                else if (lm.style === 'club') {
                    g.fillStyle = '#12060f'; g.fillRect(x + 8, y + 8, BS - 24, BS - 24);
                    g.strokeStyle = col; g.lineWidth = 3; g.globalAlpha = .5 + .45 * Math.sin(t * 6);
                    g.strokeRect(x + 8, y + 8, BS - 24, BS - 24); g.globalAlpha = 1
                }
                else if (lm.style === 'warehouse') {
                    g.strokeStyle = 'rgba(255,255,255,.13)'; g.lineWidth = 2;
                    for (let k = 0; k < 6; k++) { g.beginPath(); g.moveTo(x + 10, y + 20 + k * 23); g.lineTo(x + BS - 18, y + 20 + k * 23); g.stroke() }
                }
                else if (lm.style === 'motel') {
                    g.fillStyle = col;
                    for (let k = 0; k < 4; k++)g.fillRect(x + 12 + k * 36, y + BS - 36, 26, 5);
                    g.fillStyle = 'rgba(255,240,180,' + (night ? .5 : .2) + ')';
                    for (let k = 0; k < 4; k++)g.fillRect(x + 15 + k * 36, y + BS - 60, 18, 18)
                }
                else if (lm.style === 'custom' && !walkable) { // an AI-composed building
                    g.fillStyle = lm.roof ? LPAL[lm.roof] : '#1b2029'; g.fillRect(x + 6, y + 6, BS - 20, BS - 20);
                    g.fillStyle = 'rgba(255,255,255,.05)'; g.fillRect(x + 6, y + 6, BS - 20, 4); g.fillRect(x + 6, y + 6, 4, BS - 20);
                    if (lm.glyph) drawGlyph(x + (BS - 8) / 2, y + (BS - 8) / 2 + 4, BS - 54, lm.glyph, col)
                }
                else if (lm.style === 'billboard') {
                    g.fillStyle = '#0c0e13'; g.fillRect(x + 14, y + 18, BS - 36, 52);
                    g.strokeStyle = col; g.lineWidth = 2; g.strokeRect(x + 14, y + 18, BS - 36, 52);
                    g.fillStyle = col; g.font = 'bold 13px ui-monospace'; g.textAlign = 'center';
                    g.fillText(lm.sign, x + (BS - 8) / 2, y + 48)
                }
                else {
                    g.fillStyle = col;
                    for (let k = 0; k < 6; k++)g.fillRect(x + 8 + k * 26, y + BS - 32, 16, 12);
                    g.fillStyle = 'rgba(255,240,180,' + (night ? .45 : .18) + ')'; g.fillRect(x + 12, y + 32, BS - 34, 26)
                }
                if (lm.glyph) drawGlyph(x + (BS - 8) / 2, y + (BS - 8) / 2 + 4, 58, lm.glyph, col)
            }
            const sx2 = x + (BS - 8) / 2;
            if (!walkable) { // only buildings wear a glowing sign
                g.font = 'bold 12px ui-monospace'; g.textAlign = 'center';
                const sy2 = y + 14;
                g.fillStyle = 'rgba(0,0,0,.65)'; g.fillText(lm.sign, sx2 + 1, sy2 + 1);
                g.fillStyle = col; g.fillText(lm.sign, sx2, sy2);
                if (night) { g.globalAlpha = .35; g.fillText(lm.sign, sx2, sy2 + 1); g.globalAlpha = 1 }
            }
            if (lm.style === 'wonder') {
                g.font = 'bold 9px ui-monospace'; g.fillStyle = 'rgba(255,209,102,.7)';
                g.fillText(lm.name.toUpperCase(), sx2, y + BS - 16)
            }
            const pr = props.find(p => p.id === lm.id);
            if (pr) {
                g.font = 'bold 10px ui-monospace';
                g.fillStyle = pr.owned ? '#4ade80' : '#fbbf24';
                g.fillText(pr.owned ? 'OWNED · $' + pr.income + '/min' : 'FOR SALE $' + pr.price, sx2, y + BS - 4)
            }
        }

        function drawCar(x, y, ang, col, cop, ent, night, isPlayer) {
            g.save(); g.translate(x, y); g.rotate(ang);
            g.fillStyle = col; g.fillRect(-20, -11, 40, 22);
            g.fillStyle = 'rgba(255,255,255,.14)'; g.fillRect(-20, -11, 40, 5);
            g.fillStyle = 'rgba(0,0,0,.35)'; g.fillRect(2, -8, 10, 16);
            if (cop) { g.fillStyle = Math.sin(t * 14) > 0 ? '#ef4444' : '#3b82f6'; g.fillRect(-6, -9, 8, 18) }
            if (ent && ent.mhp && ent.hp < ent.mhp * .5) { g.fillStyle = 'rgba(60,60,60,.55)'; g.fillRect(-14, -7, 12, 14) }
            if (night) {
                g.fillStyle = '#fff7d6'; g.fillRect(17, -9, 3, 4); g.fillRect(17, 5, 3, 4);
                g.fillStyle = '#ff6b6b'; g.fillRect(-20, -9, 2, 4); g.fillRect(-20, 5, 2, 4)
            }
            g.strokeStyle = 'rgba(0,0,0,.5)'; g.strokeRect(-20, -11, 40, 22);
            g.restore()
        }

        /* ================= BOOT ================= */
        bootMenu();
        window.__bt = {
            get s() {
                return {
                    px, py, hearts, maxHearts, heat, onFoot, state, cops, gangs, gangsters, traffic, bullets, pickups,
                    W, H, Z, weather, ammo, mission: M.cur, memory: Director.memory, mode: Director.mode, targetPed,
                    car, facing, cash, props, landmarks, chapterN, playMin, store_ok: store.ok, curProp, tileOv, muse, pedTarget, trafficTarget, zoomF, baseZ,
                    zones: S.zones, npcs: S.npcs, rules: S.rules, timers: S.timers, bubbles: S.bubbles, skids, lookX, lookY, joyVec, wantCops: heat >= 2, hist: M.hist || []
                }
            },
            set(o) {
                for (const k of ['px', 'py', 'onFoot', 'heat', 'hearts', 'state', 'ammo', 'cash']) if (o[k] !== undefined) eval(k + '=o[k]');
                if (o.car !== undefined) car = o.car; if (o.key !== undefined) Director.key = o.key;
                if (o.mode !== undefined) Director.mode = o.mode; if (o.targetPed !== undefined) targetPed = o.targetPed;
                if (o.joyVec !== undefined) joyVec = o.joyVec;
                if (o.pedTarget !== undefined) pedTarget = o.pedTarget; if (o.muse !== undefined) muse = o.muse;
                if (o.invT !== undefined) invT = o.invT; if (o.godT !== undefined) godT = o.godT
            },
            clearAt, solidAt, findFree, mod, reset, startGame, action, fire, spawnGangster, blockType,
            applyPlan: p => Director.apply(p), offline: () => Director.offline(), goDirector: () => Director.go(), M, snapshot,
            S, applyOp, addLandmark, addProperty, buyProp: id => buyProp(props.find(p => p.id === id)),
            findFree, clearAt, blockType,
            pauseDirector: v => { Director.paused = v }, wipeCity: () => { props.length = 0; landmarks.length = 0; for (const k in tileOv) delete tileOv[k]; for (const k in lmIdx) delete lmIdx[k] },
            saveGame, loadSave, wipeSave, restoreSave, econTick, continueSession, gameOver, softReset, store, bootMenu, updatePropUI
        };
    </script>
